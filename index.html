<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amira Fitness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:#f8f8f6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
    .home{max-width:360px;width:100%;text-align:center;}
    .logo{width:72px;height:72px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:28px;color:#0F6E56;margin:0 auto 1.5rem;}
    h1{font-family:'DM Serif Display',serif;font-size:2rem;margin-bottom:.4rem;}
    .sub{font-size:.9rem;color:#6b7280;margin-bottom:2.5rem;}
    .btn{display:inline-block;padding:.75rem 2rem;background:#1D9E75;color:white;border-radius:30px;font-size:.9rem;font-weight:500;text-decoration:none;}
    .note{font-size:.8rem;color:#9ca3af;margin-top:1rem;}
  </style>
</head>
<body>
  <div class="home">
    <div class="logo">A</div>
    <h1>Amira Fitness</h1>
    <p class="sub">Entrenamiento personalizado</p>
    <a href="/panel" class="btn">Acceder al panel</a>
    <p class="note">¿Sos alumna? Tu entrenadora te enviará tu link personal.</p>
  </div>
</body>
</html>
