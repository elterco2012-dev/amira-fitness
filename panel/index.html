<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel — Amira Fitness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="/api/sb.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --v:#1D9E75;--vl:#E1F5EE;--vm:#5DCAA5;--vd:#0F6E56;
      --p:#EEEDFE;--pd:#3C3489;
      --a:#FAEEDA;--ad:#633806;
      --rl:#FCEBEB;--rd:#A32D2D;
      --bg:#f8f8f6;--s:#fff;--s2:#f3f4f2;
      --t:#1a1a1a;--tm:#6b7280;--th:#9ca3af;
      --b:rgba(0,0,0,0.07);--bm:rgba(0,0,0,0.13);
      --r:14px;--rs:9px;--rp:30px;
    }
    [data-theme=dark]{
      --bg:#111110;--s:#1c1c1a;--s2:#242422;
      --t:#f0ede8;--tm:#9ca3af;--th:#6b7280;
      --b:rgba(255,255,255,0.07);--bm:rgba(255,255,255,0.12);
      --vl:#0a2e20;--vm:#1a6b50;--p:#1e1c3a;--pd:#a5a0e8;
      --a:#2a200a;--ad:#d4a854;--rl:#2a1010;--rd:#f09595;
    }
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);transition:background .3s,color .3s;}

    /* Login */
    .ls{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
    .lb{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:2rem;width:100%;max-width:340px;text-align:center;}
    .ll{width:60px;height:60px;border-radius:50%;background:var(--vl);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:24px;color:var(--vd);margin:0 auto 1rem;}
    .lb h2{font-family:'DM Serif Display',serif;font-size:1.5rem;margin-bottom:.25rem;}
    .lb p{font-size:13px;color:var(--tm);margin-bottom:1.5rem;}
    .li{width:100%;padding:10px 14px;border:1px solid var(--bm);border-radius:var(--rs);font-size:14px;font-family:'DM Sans',sans-serif;background:var(--s2);color:var(--t);margin-bottom:10px;text-align:center;letter-spacing:.1em;}
    .li:focus{outline:none;border-color:var(--v);}
    .lbtn{width:100%;padding:10px;background:var(--v);color:white;border:none;border-radius:var(--rs);font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .lerr{font-size:12px;color:var(--rd);margin-top:8px;display:none;}

    /* Layout */
    .layout{display:flex;min-height:100vh;}
    .sidebar{width:220px;flex-shrink:0;background:var(--s);border-right:1px solid var(--b);padding:1.5rem 1rem;display:flex;flex-direction:column;gap:3px;}
    .brand{display:flex;align-items:center;gap:8px;margin-bottom:1.5rem;padding:0 .5rem;}
    .logo{width:34px;height:34px;border-radius:50%;background:var(--vl);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:14px;color:var(--vd);}
    .brand strong{font-size:14px;font-weight:500;display:block;color:var(--t);}
    .brand span{font-size:11px;color:var(--tm);}
    .nav{display:flex;align-items:center;gap:8px;padding:.6rem .75rem;border-radius:var(--rs);font-size:13px;color:var(--tm);cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;}
    .nav:hover{background:var(--s2);color:var(--t);}
    .nav.active{background:var(--vl);color:var(--vd);font-weight:500;}
    .ni{width:18px;text-align:center;font-size:14px;}
    .sb-bot{margin-top:auto;display:flex;flex-direction:column;gap:4px;}
    .sb-conn{display:flex;align-items:center;gap:6px;padding:.4rem .75rem;font-size:11px;color:var(--tm);}
    .dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0;}
    .dot.ok{background:var(--v);}
    .dot.err{background:var(--rd);}

    .main{flex:1;padding:2rem;overflow-y:auto;max-width:960px;}
    .ptitle{font-family:'DM Serif Display',serif;font-size:1.6rem;margin-bottom:1.5rem;color:var(--t);}

    /* Cards */
    .card{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:1rem;}
    .ctitle{font-size:11px;font-weight:500;color:var(--tm);text-transform:uppercase;letter-spacing:.05em;margin-bottom:1rem;}

    /* Metrics */
    .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem;}
    .metric{background:var(--s);border:1px solid var(--b);border-radius:var(--rs);padding:1rem 1.25rem;}
    .mlabel{font-size:11px;color:var(--tm);margin-bottom:4px;}
    .mval{font-family:'DM Serif Display',serif;font-size:2rem;color:var(--t);}
    .mval.g{color:var(--vd);}

    /* Rows */
    .arow{display:flex;align-items:center;gap:12px;padding:.75rem 0;border-bottom:1px solid var(--b);}
    .arow:last-child{border-bottom:none;}
    .av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:16px;flex-shrink:0;overflow:hidden;}
    .av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
    .av-teal{background:var(--vl);color:var(--vd);}
    .av-purple{background:var(--p);color:var(--pd);}
    .av-amber{background:var(--a);color:var(--ad);}
    .av-coral{background:#FAECE7;color:#712B13;}
    .aname{font-size:14px;font-weight:500;color:var(--t);}
    .asub{font-size:11px;color:var(--tm);margin-top:2px;}
    .badge{font-size:10px;padding:2px 9px;border-radius:var(--rp);font-weight:500;}
    .bg{background:var(--vl);color:var(--vd);}
    .bd{background:var(--p);color:var(--pd);}
    .ra{margin-left:auto;display:flex;gap:6px;}

    /* Buttons */
    .btn{padding:7px 14px;border-radius:var(--rp);font-size:12px;font-weight:500;border:1px solid var(--bm);background:var(--s);color:var(--t);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
    .btn:hover{background:var(--s2);}
    .btn-p{background:var(--v);color:white;border-color:var(--v);}
    .btn-p:hover{background:var(--vd);}
    .btn-d{color:var(--rd);border-color:#F09595;}
    .btn-d:hover{background:var(--rl);}
    .btn-s{padding:4px 11px;font-size:11px;}
    .btn-warn{background:var(--a);color:var(--ad);border-color:transparent;}

    /* Forms */
    label{font-size:12px;color:var(--tm);display:block;margin-bottom:4px;}
    input,select,textarea{width:100%;padding:8px 12px;border:1px solid var(--bm);border-radius:var(--rs);font-size:13px;font-family:'DM Sans',sans-serif;background:var(--s2);color:var(--t);margin-bottom:12px;transition:border-color .15s;}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--v);}
    textarea{height:70px;resize:vertical;}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

    /* Ejercicios */
    .ex-item{background:var(--s2);border-radius:var(--rs);padding:.7rem .9rem;margin-bottom:.4rem;display:flex;align-items:flex-start;gap:10px;}
    .exn{width:24px;height:24px;border-radius:50%;background:var(--s);border:1px solid var(--bm);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--tm);flex-shrink:0;margin-top:1px;}

    /* Tabs */
    .dtabs{display:flex;gap:6px;margin-bottom:1rem;}
    .dtab{padding:6px 14px;border-radius:var(--rp);font-size:12px;font-weight:500;border:1px solid var(--bm);background:var(--s);color:var(--tm);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
    .dtab.active{background:var(--v);color:white;border-color:var(--v);}
    .stabs{display:flex;gap:5px;margin-bottom:.75rem;flex-wrap:wrap;}
    .stab{padding:4px 12px;border-radius:var(--rp);font-size:11px;border:1px solid var(--bm);background:var(--s);color:var(--tm);cursor:pointer;font-family:'DM Sans',sans-serif;}
    .stab.active{background:var(--p);color:var(--pd);border-color:transparent;font-weight:500;}

    /* Comentarios */
    .cbox{background:var(--s2);border-radius:var(--rs);padding:.7rem .9rem;margin-bottom:.5rem;}
    .cmeta{font-size:10px;color:var(--th);margin-bottom:3px;}
    .ctxt{font-size:12px;color:var(--t);line-height:1.5;}

    /* Chart */
    .chart-wrap{position:relative;height:220px;margin-top:1rem;}

    /* Link box */
    .lbox{background:var(--s2);border:1px solid var(--bm);border-radius:var(--rs);padding:.6rem .9rem;font-size:12px;color:var(--vd);font-family:monospace;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:6px;}
    .cbtn{background:none;border:none;font-size:11px;color:var(--tm);cursor:pointer;font-family:'DM Sans',sans-serif;}
    .cbtn:hover{color:var(--v);}

    .nota{background:var(--a);border-radius:var(--rs);padding:.6rem .9rem;font-size:12px;color:var(--ad);margin-bottom:.75rem;}
    .pbadge{display:inline-flex;align-items:center;gap:4px;background:var(--p);border-radius:var(--rp);padding:3px 10px;font-size:11px;color:var(--pd);margin-bottom:.75rem;}
    .sm{font-size:12px;color:var(--vd);margin-left:8px;}
    .em{font-size:12px;color:var(--rd);margin-left:8px;}
    .empty{font-size:13px;color:var(--tm);padding:.5rem 0;}
    .shd{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
    .shdt{font-size:14px;font-weight:500;color:var(--t);}
    .spin{text-align:center;padding:3rem;color:var(--tm);font-size:13px;}

    /* Notif badges */
    .nbadge{background:var(--rd);color:white;border-radius:99px;font-size:10px;padding:1px 6px;margin-left:4px;display:none;}

    /* Modal overlay para editar alumna */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;}
    .modal{background:var(--s);border-radius:var(--r);padding:1.5rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
    .modal h3{font-family:'DM Serif Display',serif;font-size:1.3rem;margin-bottom:1rem;color:var(--t);}

    @media(max-width:700px){.sidebar{display:none;}.main{padding:1rem;}.metrics{grid-template-columns:1fr 1fr;}}
  </style>
</head>
<body>

<div id="LS" class="ls" style="display:none;">
  <div class="lb">
    <div class="ll">A</div>
    <h2>Panel privado</h2>
    <p>Ingresá tu contraseña</p>
    <input class="li" type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    <button class="lbtn" onclick="login()">Entrar</button>
    <div class="lerr" id="lerr">Contraseña incorrecta</div>
  </div>
</div>

<div id="PS" style="display:none;">
<div class="layout">
  <aside class="sidebar">
    <div class="brand"><div class="logo">A</div><div><strong>Amira Fitness</strong><span>Panel</span></div></div>
    <button class="nav active" onclick="go('inicio')"><span class="ni">🏠</span>Inicio</button>
    <button class="nav" onclick="go('alumnas')"><span class="ni">👤</span>Alumnas</button>
    <button class="nav" onclick="go('rutinas')"><span class="ni">📋</span>Rutinas</button>
    <button class="nav" onclick="go('historial')"><span class="ni">📈</span>Historial</button>
    <button class="nav" onclick="go('comentarios')"><span class="ni">💬</span>Comentarios<span class="nbadge" id="nb-com"></span></button>
    <button class="nav" onclick="go('registros')"><span class="ni">📥</span>Registros<span class="nbadge" id="nb-reg"></span></button>
    <button class="nav" onclick="go('recordatorios')"><span class="ni">⏰</span>Recordatorios</button>
    <button class="nav" onclick="go('links')"><span class="ni">🔗</span>Links</button>
    <button class="nav" onclick="go('config')"><span class="ni">⚙️</span>Config</button>
    <div class="sb-bot">
      <div class="sb-conn"><div class="dot" id="sbd"></div><span id="sbl">Conectando...</span></div>
      <button class="nav" onclick="toggleDark()"><span class="ni" id="tic">🌙</span>Modo oscuro</button>
      <button class="nav" onclick="doLogout()"><span class="ni">🚪</span>Salir</button>
    </div>
  </aside>
  <main class="main" id="main"><div class="spin">Cargando...</div></main>
</div>
</div>

<!-- Modal editar alumna -->
<div class="modal-bg" id="modal-edit" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>Editar alumna</h3>
    <label>Nombre completo</label>
    <input type="text" id="e-nombre" placeholder="Nombre y apellido">
    <label>WhatsApp (con código de país sin +)</label>
    <input type="tel" id="e-tel" placeholder="Ej: 5491123456789">
    <div class="frow">
      <div><label>Tipo</label>
        <select id="e-tipo">
          <option value="gym">Gimnasio</option>
          <option value="distancia">A distancia</option>
        </select>
      </div>
      <div><label>Días/semana</label>
        <select id="e-dias">
          <option value="2">2 días</option>
          <option value="3">3 días</option>
        </select>
      </div>
    </div>
    <label>Notas personales</label>
    <textarea id="e-notas" placeholder="Objetivos, lesiones, consideraciones..."></textarea>
    <div style="display:flex;gap:8px;margin-top:.5rem;">
      <button class="btn btn-p" onclick="saveEdit()">Guardar cambios</button>
      <button class="btn" onclick="closeModal()">Cancelar</button>
    </div>
    <div id="edit-msg" style="font-size:12px;margin-top:8px;"></div>
  </div>
</div>

<script>
const BASE = location.origin;
const COLORS = ['teal','purple','amber','coral'];
let DB = { alumnas:[], rutinas:{}, comentarios:[], registros:[] };
let S = {
  view:'inicio', selA:null, selSem:1, selDia:1,
  addA:false, addEx:false, selHistEx:null, editId:null,
  newA:{nombre:'',slug:'',tipo:'gym',dias:3,notas:'',foto:'',tel:''},
  newEx:{nombre:'',series:'3',reps:'10',tip:'',video:''},
  msg:'', err:'', sbOk:false
};
let dark = localStorage.getItem('af-dark')==='1';
let charts={}, pollT=null;
let prevCom=0, prevReg=0;

if(dark) document.documentElement.setAttribute('data-theme','dark');

// ── Auth ──────────────────────────────────────────────────────
function login(){
  const v = document.getElementById('pwd').value;
  const pwd = localStorage.getItem('af-pwd')||'amira2025';
  if(v===pwd){ localStorage.setItem('af-ok','1'); showPanel(); }
  else document.getElementById('lerr').style.display='block';
}
function showPanel(){ document.getElementById('LS').style.display='none'; document.getElementById('PS').style.display='block'; loadAll(); }
function doLogout(){ localStorage.removeItem('af-ok'); document.getElementById('PS').style.display='none'; document.getElementById('LS').style.display='flex'; }
function initAuth(){ if(localStorage.getItem('af-ok')==='1') showPanel(); else document.getElementById('LS').style.display='flex'; }

// ── Theme ─────────────────────────────────────────────────────
function toggleDark(){
  dark=!dark;
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  localStorage.setItem('af-dark',dark?'1':'0');
  document.getElementById('tic').textContent=dark?'☀️':'🌙';
}
document.getElementById('tic').textContent=dark?'☀️':'🌙';

// ── Helpers ───────────────────────────────────────────────────
function slugify(n){ return n.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); }
function ini(n){ return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function getA(id){ return DB.alumnas.find(a=>a.id===id); }
function avH(a){ return a.foto?`<img src="${a.foto}" alt="${a.nombre}">`:`${ini(a.nombre)}`; }
function getEx(aId,sem,dia){ try{return DB.rutinas[aId]?.[sem]?.find(d=>d.dia===dia)?.ejercicios||[];}catch(e){return[];} }
function copyL(slug){ navigator.clipboard.writeText(`${BASE}/alumna/${slug}`).then(()=>{S.msg='Copiado ✓';render();setTimeout(()=>{S.msg='';render();},1200);}); }

function sbSt(ok,msg){
  S.sbOk=ok;
  const d=document.getElementById('sbd'),l=document.getElementById('sbl');
  if(d)d.className='dot '+(ok?'ok':'err');
  if(l)l.textContent=msg;
}

// ── Load ──────────────────────────────────────────────────────
async function loadAll(){
  try{
    const [alumnas,rutinas,coms,regs]=await Promise.all([
      sbGet('alumnas','order=created_at.asc'),
      sbGet('rutinas','order=alumna_id.asc,semana.asc,dia.asc'),
      sbGet('comentarios','order=created_at.desc'),
      sbGet('registros','order=created_at.desc')
    ]);
    DB.alumnas=alumnas;
    DB.rutinas={};
    rutinas.forEach(r=>{
      if(!DB.rutinas[r.alumna_id])DB.rutinas[r.alumna_id]={};
      if(!DB.rutinas[r.alumna_id][r.semana])DB.rutinas[r.alumna_id][r.semana]=[];
      DB.rutinas[r.alumna_id][r.semana].push({dia:r.dia,ejercicios:r.ejercicios||[]});
    });
    DB.comentarios=coms;
    DB.registros=regs;
    prevCom=coms.length;
    prevReg=regs.filter(r=>r.estado==='pendiente').length;
    if(DB.alumnas.length===0) await seedMaria();
    if(!S.selA&&DB.alumnas.length>0) S.selA=DB.alumnas[0].id;
    sbSt(true,'Conectado ✓');
    render();
    startPoll();
  }catch(e){
    sbSt(false,'Sin conexión');
    console.error(e);
    render();
  }
}

async function seedMaria(){
  try{
    const res=await fetch('/api/seed.json');
    const data=await res.json();
    for(const a of data.alumnas) await sbUpsert('alumnas',a);
    for(const r of data.rutinas) await sbUpsert('rutinas',r);
    await loadAll();
  }catch(e){ console.error('Seed failed',e); }
}

function startPoll(){
  if(pollT)clearInterval(pollT);
  pollT=setInterval(async()=>{
    try{
      const [coms,regs]=await Promise.all([
        sbGet('comentarios','select=id&order=created_at.desc&limit=1'),
        sbGet('registros','estado=eq.pendiente&select=id')
      ]);
      const nc=parseInt(coms[0]?.id||0);
      const nr=regs.length;
      const bnc=document.getElementById('nb-com');
      const bnr=document.getElementById('nb-reg');
      if(nc>prevCom&&bnc){bnc.style.display='inline';bnc.textContent='●';}
      if(nr>prevReg&&bnr){bnr.style.display='inline';bnr.textContent=nr;}
      prevReg=nr;
    }catch(e){}
  },8000);
}

// ── Rutinas ───────────────────────────────────────────────────
function ensureLocal(aId,sem){
  if(!DB.rutinas[aId])DB.rutinas[aId]={};
  if(!DB.rutinas[aId][sem])DB.rutinas[aId][sem]=[1,2,3].map(d=>({dia:d,ejercicios:[]}));
}

async function saveDay(){
  const day=DB.rutinas[S.selA]?.[S.selSem]?.find(d=>d.dia===S.selDia);
  if(!day)return;
  S.msg='Guardando...';render();
  try{
    await sbUpsert('rutinas',{alumna_id:S.selA,semana:S.selSem,dia:S.selDia,ejercicios:day.ejercicios,updated_at:new Date().toISOString()});
    S.msg='Guardado en la nube ✓';S.err='';
  }catch(e){S.err='Error al guardar';S.msg='';}
  render();
  setTimeout(()=>{S.msg='';render();},2500);
}

function copiarSem(aId,sem){
  if(sem<=1)return false;
  const prev=DB.rutinas[aId]?.[sem-1];
  if(!prev)return false;
  ensureLocal(aId,sem);
  let ok=false;
  DB.rutinas[aId][sem].forEach((d,i)=>{
    if(d.ejercicios.length===0&&prev[i]){d.ejercicios=JSON.parse(JSON.stringify(prev[i].ejercicios));ok=true;}
  });
  return ok;
}

async function handleSem(sem){
  S.selSem=sem;S.selDia=1;
  const a=getA(S.selA);
  if(a){
    ensureLocal(a.id,sem);
    if(copiarSem(a.id,sem)){
      S.msg='Semana copiada de la anterior — editá lo que cambie';render();
      setTimeout(()=>{S.msg='';render();},3000);return;
    }
  }
  render();
}

// ── Alumnas CRUD ──────────────────────────────────────────────
async function addAlumna(){
  if(!S.newA.nombre.trim())return;
  const id=Date.now();
  const slug=S.newA.slug||slugify(S.newA.nombre.split(' ')[0]);
  const a={id,slug,nombre:S.newA.nombre,tipo:S.newA.tipo,dias:S.newA.dias,notas:S.newA.notas,foto:S.newA.foto,tel:S.newA.tel,color:COLORS[DB.alumnas.length%COLORS.length]};
  S.msg='Guardando...';render();
  try{
    await sbUpsert('alumnas',a);
    DB.alumnas.push(a);
    if(!S.selA)S.selA=id;
    S.newA={nombre:'',slug:'',tipo:'gym',dias:3,notas:'',foto:'',tel:''};
    S.addA=false;S.msg='Alumna creada ✓';S.err='';
    render();setTimeout(()=>{S.msg='';render();},2000);
  }catch(e){S.err='Error al guardar';S.msg='';render();}
}

async function deleteAlumna(id){
  if(!confirm('¿Eliminás esta alumna y su rutina?'))return;
  try{
    await sbDelete('alumnas',`id=eq.${id}`);
    DB.alumnas=DB.alumnas.filter(a=>a.id!==id);
    delete DB.rutinas[id];
    if(S.selA===id)S.selA=DB.alumnas[0]?.id||null;
    render();
  }catch(e){alert('Error al eliminar');}
}

// ── Editar alumna ─────────────────────────────────────────────
function openEdit(id){
  const a=getA(id); if(!a)return;
  S.editId=id;
  document.getElementById('e-nombre').value=a.nombre;
  document.getElementById('e-tel').value=a.tel||'';
  document.getElementById('e-tipo').value=a.tipo;
  document.getElementById('e-dias').value=a.dias;
  document.getElementById('e-notas').value=a.notas||'';
  document.getElementById('edit-msg').textContent='';
  document.getElementById('modal-edit').style.display='flex';
}
function closeModal(){ document.getElementById('modal-edit').style.display='none'; S.editId=null; }

async function saveEdit(){
  const a=getA(S.editId); if(!a)return;
  const updates={
    nombre:document.getElementById('e-nombre').value.trim(),
    tel:document.getElementById('e-tel').value.trim(),
    tipo:document.getElementById('e-tipo').value,
    dias:parseInt(document.getElementById('e-dias').value),
    notas:document.getElementById('e-notas').value.trim()
  };
  document.getElementById('edit-msg').textContent='Guardando...';
  try{
    await sbPatch('alumnas',`id=eq.${S.editId}`,updates);
    Object.assign(a,updates);
    document.getElementById('edit-msg').textContent='';
    closeModal();
    render();
  }catch(e){ document.getElementById('edit-msg').textContent='Error al guardar. Intentá de nuevo.'; }
}

async function handleFoto(aId,input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    const foto=e.target.result;
    const a=getA(aId); if(a)a.foto=foto;
    try{await sbPatch('alumnas',`id=eq.${aId}`,{foto});}catch(e){}
    render();
  };
  reader.readAsDataURL(file);
}

function addEx(){
  if(!S.newEx.nombre.trim())return;
  ensureLocal(S.selA,S.selSem);
  const day=DB.rutinas[S.selA][S.selSem].find(d=>d.dia===S.selDia);
  day.ejercicios.push({...S.newEx});
  S.newEx={nombre:'',series:'3',reps:'10',tip:'',video:''};
  S.addEx=false; render();
}
function delEx(i){
  const day=DB.rutinas[S.selA]?.[S.selSem]?.find(d=>d.dia===S.selDia);
  if(day)day.ejercicios.splice(i,1); render();
}

// ── Registros ─────────────────────────────────────────────────
async function aprobar(id){
  const reg=DB.registros.find(r=>r.id===id); if(!reg)return;
  await sbPatch('registros',`id=eq.${id}`,{estado:'aprobado'});
  reg.estado='aprobado';
  S.newA={
    nombre:reg.nombre,slug:slugify(reg.nombre.split(' ')[0]),
    tipo:reg.ubicacion?.includes('Buenos Aires')?'gym':'distancia',
    dias:reg.dias?.includes('3')?3:2,
    notas:`Objetivos: ${reg.objetivos||''} | Lesiones: ${reg.lesiones||''}`,
    foto:'',tel:reg.tel||''
  };
  S.addA=true; go('alumnas');
}
async function rechazar(id){
  if(!confirm('¿Rechazás?'))return;
  await sbPatch('registros',`id=eq.${id}`,{estado:'rechazado'});
  DB.registros.find(r=>r.id===id).estado='rechazado'; render();
}

// ── Recordatorios ─────────────────────────────────────────────
function envRec(aId){
  const a=getA(aId); if(!a)return;
  const ph=(a.tel||'').replace(/\D/g,'');
  if(!ph){alert('Esta alumna no tiene WhatsApp cargado. Editá su perfil primero.');return;}
  const msg=encodeURIComponent(`Hola ${a.nombre.split(' ')[0]}! 💪 Hoy es día de entrenamiento.\n\nTu rutina: ${BASE}/alumna/${a.slug}\n\n¡Vamos que podés! — Amira`);
  window.open(`https://wa.me/${ph}?text=${msg}`,'_blank');
}
function envRes(aId){
  const a=getA(aId); if(!a)return;
  const ph=(a.tel||'').replace(/\D/g,'');
  if(!ph){alert('Esta alumna no tiene WhatsApp cargado. Editá su perfil primero.');return;}
  const nc=DB.comentarios.filter(c=>c.alumna_id===aId).length;
  const msg=encodeURIComponent(`¡Hola ${a.nombre.split(' ')[0]}! 🌟 Resumen de la semana:\n\n💬 Dejaste ${nc} nota${nc!==1?'s':''} esta semana\n📈 Tu progreso está registrado\n\nTu rutina: ${BASE}/alumna/${a.slug}\n\n— Amira 💚`);
  window.open(`https://wa.me/${ph}?text=${msg}`,'_blank');
}
function envTodas(){
  const ph=localStorage.getItem('af-amira-ph')||'';
  if(!ph){alert('Configurá tu número de WhatsApp en Config.');return;}
  const txt=DB.alumnas.map(a=>`• ${a.nombre}: ${DB.comentarios.filter(c=>c.alumna_id===a.id).length} notas`).join('\n');
  const msg=encodeURIComponent(`📊 Resumen semanal Amira Fitness\n\n${txt}\n\nPanel: ${BASE}/panel`);
  window.open(`https://wa.me/${ph}?text=${msg}`,'_blank');
}

// ── Historial ─────────────────────────────────────────────────
function getPesos(aId){
  const all=JSON.parse(localStorage.getItem('af-pesos')||'{}');
  return Object.fromEntries(Object.entries(all).filter(([k])=>k.startsWith(`p-${aId}-`)));
}

// ── View ──────────────────────────────────────────────────────
function go(v){
  S.view=v;
  if(v==='comentarios'){const b=document.getElementById('nb-com');if(b)b.style.display='none';}
  if(v==='registros'){const b=document.getElementById('nb-reg');if(b)b.style.display='none';}
  document.querySelectorAll('.nav').forEach((el,i)=>{
    el.classList.toggle('active',['inicio','alumnas','rutinas','historial','comentarios','registros','recordatorios','links','config'][i]===v);
  });
  render();
}

function render(){
  const m=document.getElementById('main');
  const views={inicio:rInicio,alumnas:rAlumnas,rutinas:rRutinas,historial:rHistorial,comentarios:rComentarios,registros:rRegistros,recordatorios:rRecordatorios,links:rLinks,config:rConfig};
  m.innerHTML=(views[S.view]||rInicio)();
  if(S.view==='historial')drawChart();
}

function rHistorial(){
  const a=getA(S.selA);
  const pesos=a?getPesos(a.id):{};
  const hist={};
  Object.entries(pesos).forEach(([k,v])=>{
    const p=k.split('-'); const ex=a?getEx(a.id,+p[2],+p[3])[+p[4]]:null;
    if(!ex)return;
    if(!hist[ex.nombre])hist[ex.nombre]=[];
    hist[ex.nombre].push({sem:+p[2],dia:+p[3],kg:parseFloat(v)||0,label:`S${p[2]}D${p[3]}`});
  });
  const exns=Object.keys(hist);
  if(!S.selHistEx&&exns.length>0)S.selHistEx=exns[0];
  return`<div class="ptitle">Historial de progreso</div>
  <div style="display:flex;gap:7px;margin-bottom:1.25rem;flex-wrap:wrap;">
    ${DB.alumnas.map(al=>`<button class="btn btn-s${S.selA===al.id?' btn-p':''}" onclick="S.selA=${al.id};S.selHistEx=null;render()">${al.nombre.split(' ')[0]}</button>`).join('')}
  </div>
  ${exns.length===0?`<div class="card"><div class="empty">Sin pesos registrados todavía. Aparecen cuando la alumna carga pesos en su app.</div></div>`:`
  <div class="card">
    <div class="ctitle">Evolución por ejercicio</div>
    <label>Ejercicio</label>
    <select onchange="S.selHistEx=this.value;render()" style="margin-bottom:1rem;">
      ${exns.map(n=>`<option value="${n}" ${n===S.selHistEx?'selected':''}>${n}</option>`).join('')}
    </select>
    <div class="chart-wrap"><canvas id="hchart"></canvas></div>
  </div>
  <div class="card"><div class="ctitle">Tabla de pesos</div>
    <table style="width:100%;font-size:12px;border-collapse:collapse;">
      <thead><tr>${['Ejercicio','Semana','Día','Peso'].map(h=>`<th style="font-size:10px;font-weight:500;color:var(--tm);text-align:left;padding:4px 8px;border-bottom:1px solid var(--b);">${h}</th>`).join('')}</tr></thead>
      <tbody>${Object.entries(hist).flatMap(([n,es])=>es.sort((a,b)=>a.sem-b.sem||a.dia-b.dia).map(e=>`<tr><td style="padding:6px 8px;border-bottom:1px solid var(--b);">${n}</td><td style="padding:6px 8px;border-bottom:1px solid var(--b);">Sem ${e.sem}</td><td style="padding:6px 8px;border-bottom:1px solid var(--b);">Día ${e.dia}</td><td style="padding:6px 8px;border-bottom:1px solid var(--b);font-weight:500;">${e.kg} kg</td></tr>`)).join('')}</tbody>
    </table>
  </div>`}`;
}

function drawChart(){
  const a=getA(S.selA); if(!a)return;
  const pesos=getPesos(a.id);
  const hist={};
  Object.entries(pesos).forEach(([k,v])=>{
    const p=k.split('-'); const ex=getEx(a.id,+p[2],+p[3])[+p[4]];
    if(!ex)return;
    if(!hist[ex.nombre])hist[ex.nombre]=[];
    hist[ex.nombre].push({sem:+p[2],dia:+p[3],kg:parseFloat(v)||0,label:`S${p[2]}D${p[3]}`});
  });
  const data=(hist[S.selHistEx]||[]).sort((a,b)=>a.sem-b.sem||a.dia-b.dia);
  const c=document.getElementById('hchart'); if(!c)return;
  if(charts.h)charts.h.destroy();
  const dk=document.documentElement.getAttribute('data-theme')==='dark';
  const gc=dk?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.06)';
  const tc=dk?'#9ca3af':'#6b7280';
  charts.h=new Chart(c,{type:'line',data:{labels:data.map(d=>d.label),datasets:[{label:`${S.selHistEx} (kg)`,data:data.map(d=>d.kg),borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.1)',borderWidth:2,pointRadius:4,pointBackgroundColor:'#1D9E75',tension:.3,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:gc},ticks:{color:tc,font:{family:'DM Sans',size:11}}},y:{grid:{color:gc},ticks:{color:tc,font:{family:'DM Sans',size:11}},beginAtZero:true}}}});
}

  return`<div class="ptitle">Registros de alumnas</div>
  <div class="card" style="background:var(--vl);border-color:var(--vm);margin-bottom:1rem;">
    <div style="font-size:13px;color:var(--vd);line-height:1.6;">Cuando alguien completa el formulario en <strong>${BASE}/registro</strong> aparece acá. Al aprobar, el perfil se pre-carga automáticamente.</div>
  </div>
  ${pend.length===0&&otros.length===0?`<div class="card"><div class="empty">Sin registros todavía.</div></div>`:''}
  ${pend.map(r=>`<div class="card" style="border-left:3px solid var(--v);border-radius:0 var(--r) var(--r) 0;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem;">
      <div><div class="aname">${r.nombre}</div><div class="asub">${r.fecha||''} · ${r.ubicacion||''}</div></div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-p btn-s" onclick="aprobar(${r.id})">✓ Aprobar</button>
        <button class="btn btn-s btn-d" onclick="rechazar(${r.id})">Rechazar</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;">
      <div><span style="color:var(--tm);">WhatsApp:</span> ${r.tel||'—'}</div>
      <div><span style="color:var(--tm);">Mail:</span> ${r.mail||'—'}</div>
      <div><span style="color:var(--tm);">Objetivos:</span> ${r.objetivos||'—'}</div>
      <div><span style="color:var(--tm);">Modalidad:</span> ${r.modalidad||'—'}</div>
      <div><span style="color:var(--tm);">Días/sem:</span> ${r.dias||'—'}</div>
      <div><span style="color:var(--tm);">Experiencia:</span> ${r.exp||'—'}</div>
    </div>
    ${r.lesiones&&r.lesiones!=='—'?`<div class="nota" style="margin-top:.75rem;margin-bottom:0;">⚠️ ${r.lesiones}</div>`:''}
  </div>`).join('')}
  ${otros.length>0?`<div class="ctitle" style="margin:.75rem 0 .5rem;">Historial</div>
  ${otros.map(r=>`<div class="card" style="opacity:.7;"><div style="display:flex;justify-content:space-between;align-items:center;"><div><div class="aname">${r.nombre}</div><div class="asub">${r.fecha||''}</div></div><span class="badge" style="background:${r.estado==='aprobado'?'var(--vl)':'var(--rl)'};color:${r.estado==='aprobado'?'var(--vd)':'var(--rd)'};">${r.estado}</span></div></div>`).join('')}`:''}`;
}

function rRecordatorios(){
  const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const hoy=dias[new Date().getDay()];
  const sinWA=DB.alumnas.filter(a=>!a.tel);
  return`<div class="ptitle">Recordatorios y resúmenes</div>
  ${sinWA.length>0?`<div class="card" style="background:var(--rl);border-color:var(--rd);margin-bottom:1rem;">
    <div style="font-size:13px;color:var(--rd);font-weight:500;">⚠️ ${sinWA.length} alumna${sinWA.length!==1?'s':''} sin WhatsApp cargado: ${sinWA.map(a=>a.nombre.split(' ')[0]).join(', ')}</div>
    <div style="font-size:12px;color:var(--rd);margin-top:4px;">Editá su perfil para poder enviarle recordatorios.</div>
  </div>`:''}
  <div class="card" style="margin-bottom:1rem;">
    <div class="ctitle">Resumen semanal</div>
    <p style="font-size:13px;color:var(--tm);margin-bottom:1rem;line-height:1.6;">Mandá un mensaje con el progreso de la semana. Cada alumna recibe su resumen personalizado.</p>
    <button class="btn btn-p btn-s" onclick="envTodas()" style="margin-bottom:1rem;">📊 Enviar resumen a todas</button>
    ${DB.alumnas.map(a=>`<div style="display:flex;align-items:center;gap:10px;padding:.6rem 0;border-bottom:1px solid var(--b);">
      <div class="av av-${a.color}" style="width:32px;height:32px;font-size:13px;">${avH(a)}</div>
      <div style="flex:1;font-size:13px;font-weight:500;">${a.nombre}${!a.tel?` <span style="font-size:11px;color:var(--rd);">(sin WhatsApp)</span>`:''}</div>
      <button class="btn btn-s" onclick="envRes(${a.id})">Enviar resumen</button>
    </div>`).join('')}
  </div>
  <div class="card">
    <div class="ctitle">Recordatorios de entrenamiento</div>
    <p style="font-size:13px;color:var(--tm);margin-bottom:1rem;line-height:1.6;">Hoy es <strong>${hoy}</strong>. Mandá un recordatorio a quien tenga que entrenar hoy.</p>
    ${DB.alumnas.map(a=>`<div style="display:flex;align-items:center;gap:10px;padding:.6rem 0;border-bottom:1px solid var(--b);">
      <div class="av av-${a.color}" style="width:32px;height:32px;font-size:13px;">${avH(a)}</div>
      <div style="flex:1;"><div style="font-size:13px;font-weight:500;">${a.nombre}</div><div style="font-size:11px;color:var(--tm);">${a.dias} días/sem</div></div>
      <button class="btn btn-s" onclick="envRec(${a.id})">💬 Recordar</button>
    </div>`).join('')}
  </div>
  <div class="card" style="background:var(--a);border-color:transparent;">
    <div style="font-size:12px;color:var(--ad);line-height:1.7;"><strong>Nota sobre automatización:</strong> los recordatorios y resúmenes automáticos (que se envíen solos sin que hagas nada) requieren un servidor adicional fuera de Vercel. Por ahora se envían con un clic. Si querés automatizarlos completamente, el próximo paso sería conectar Make.com o un cron job — lo podemos hacer.</div>
  </div>`;
}

function rLinks(){
  return`<div class="ptitle">Links por alumna</div>
  <div class="card" style="background:var(--vl);border-color:var(--vm);margin-bottom:1rem;">
    <div style="font-size:13px;color:var(--vd);line-height:1.6;">Copiá el link y mandáselo por WhatsApp. La alumna lo abre desde el celu y ve su rutina.</div>
  </div>
  ${DB.alumnas.map(a=>`<div class="card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:.75rem;">
      <div class="av av-${a.color}">${avH(a)}</div>
      <div><div class="aname">${a.nombre}</div></div>
    </div>
    <div class="lbox"><span>${BASE}/alumna/${a.slug}</span><button class="cbtn" onclick="copyL('${a.slug}')">Copiar</button></div>
  </div>`).join('')}
  ${S.msg?`<div class="sm" style="margin-top:.5rem;">${S.msg}</div>`:''}`;
}

  const ph=localStorage.getItem('af-amira-ph')||'';
  const pwd=localStorage.getItem('af-pwd')||'amira2025';
  return`<div class="ptitle">Configuración</div>
  <div class="card">
    <div class="ctitle">Estado de Supabase</div>
    <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:${S.sbOk?'var(--vd)':'var(--rd)'};margin-bottom:.5rem;">
      <div style="width:8px;height:8px;border-radius:50%;background:${S.sbOk?'var(--v)':'var(--rd)'}"></div>
      ${S.sbOk?'Conectado y sincronizando en tiempo real':'Sin conexión — verificar credenciales'}
    </div>
    <div style="font-size:12px;color:var(--tm);">Proyecto: aywkeoxwybzcexaichtv.supabase.co</div>
  </div>
  <div class="card">
    <div class="ctitle">Contraseña del panel</div>
    <label>Contraseña actual: <strong>${pwd}</strong></label>
    <input type="password" id="np" placeholder="Nueva contraseña (mín. 4 caracteres)" style="margin-top:8px;">
    <button class="btn btn-p btn-s" onclick="const v=document.getElementById('np').value;if(v.length>=4){localStorage.setItem('af-pwd',v);alert('Contraseña actualizada. Vas a necesitar usarla la próxima vez.');}else alert('Mínimo 4 caracteres');">Cambiar contraseña</button>
  </div>
  <div class="card">
    <div class="ctitle">WhatsApp de Amira (para notificaciones)</div>
    <p style="font-size:12px;color:var(--tm);margin-bottom:12px;line-height:1.6;">Número para recibir los resúmenes generales. Con código de país, sin + ni espacios.<br>Argentina: <code>5491123456789</code></p>
    <label>Tu número</label>
    <input type="tel" id="wai" placeholder="5491123456789" value="${ph}">
    <button class="btn btn-p btn-s" onclick="const v=document.getElementById('wai').value;if(v){localStorage.setItem('af-amira-ph',v);S.msg='Guardado ✓';render();}">Guardar</button>

initAuth();
</script>
