<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel — Amira Fitness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --verde:#1D9E75;--verde-l:#E1F5EE;--verde-m:#5DCAA5;--verde-d:#0F6E56;
      --purp:#EEEDFE;--purp-d:#3C3489;
      --amber:#FAEEDA;--amber-d:#633806;
      --rojo-l:#FCEBEB;--rojo-d:#A32D2D;
      --txt:#1a1a1a;--txt-m:#6b7280;
      --border:rgba(0,0,0,0.07);--border-m:rgba(0,0,0,0.13);
      --surf:#f8f8f6;--white:#fff;
      --r:14px;--rs:9px;--rp:30px;
    }
    body{font-family:'DM Sans',sans-serif;background:var(--surf);color:var(--txt);}
    .layout{display:flex;min-height:100vh;}

    /* Sidebar */
    .sidebar{width:220px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);padding:1.5rem 1rem;display:flex;flex-direction:column;gap:3px;}
    .brand{display:flex;align-items:center;gap:8px;margin-bottom:1.5rem;padding:0 .5rem;}
    .logo{width:34px;height:34px;border-radius:50%;background:var(--verde-l);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:14px;color:var(--verde-d);}
    .brand strong{font-size:14px;font-weight:500;display:block;}
    .brand span{font-size:11px;color:var(--txt-m);}
    .nav{display:flex;align-items:center;gap:8px;padding:.6rem .75rem;border-radius:var(--rs);font-size:13px;color:var(--txt-m);cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;}
    .nav:hover{background:var(--surf);color:var(--txt);}
    .nav.active{background:var(--verde-l);color:var(--verde-d);font-weight:500;}
    .nav-ic{width:18px;text-align:center;font-size:14px;}

    .main{flex:1;padding:2rem;overflow-y:auto;max-width:900px;}
    .page-title{font-family:'DM Serif Display',serif;font-size:1.6rem;margin-bottom:1.5rem;}

    /* Cards */
    .card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:1rem;}
    .card-title{font-size:11px;font-weight:500;color:var(--txt-m);text-transform:uppercase;letter-spacing:.05em;margin-bottom:1rem;}

    /* Metrics */
    .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem;}
    .metric{background:var(--white);border:1px solid var(--border);border-radius:var(--rs);padding:1rem 1.25rem;}
    .metric-label{font-size:11px;color:var(--txt-m);margin-bottom:4px;}
    .metric-val{font-family:'DM Serif Display',serif;font-size:2rem;}
    .metric-val.green{color:var(--verde-d);}

    /* Alumna */
    .arow{display:flex;align-items:center;gap:12px;padding:.75rem 0;border-bottom:1px solid var(--border);}
    .arow:last-child{border-bottom:none;}
    .av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:16px;flex-shrink:0;overflow:hidden;}
    .av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
    .av-teal{background:var(--verde-l);color:var(--verde-d);}
    .av-purple{background:var(--purp);color:var(--purp-d);}
    .av-amber{background:var(--amber);color:var(--amber-d);}
    .av-coral{background:#FAECE7;color:#712B13;}
    .aname{font-size:14px;font-weight:500;}
    .asub{font-size:11px;color:var(--txt-m);margin-top:2px;}
    .badge{font-size:10px;padding:2px 9px;border-radius:var(--rp);font-weight:500;}
    .bg-gym{background:var(--verde-l);color:var(--verde-d);}
    .bg-dist{background:var(--purp);color:var(--purp-d);}
    .row-acts{margin-left:auto;display:flex;gap:6px;}

    /* Buttons */
    .btn{padding:7px 14px;border-radius:var(--rp);font-size:12px;font-weight:500;border:1px solid var(--border-m);background:var(--white);color:var(--txt);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
    .btn:hover{background:var(--surf);}
    .btn-p{background:var(--verde);color:white;border-color:var(--verde);}
    .btn-p:hover{background:var(--verde-d);}
    .btn-d{color:var(--rojo-d);border-color:#F09595;}
    .btn-d:hover{background:var(--rojo-l);}
    .btn-s{padding:4px 11px;font-size:11px;}
    .btn-amber{background:var(--amber);color:var(--amber-d);border-color:transparent;}

    /* Form */
    label{font-size:12px;color:var(--txt-m);display:block;margin-bottom:4px;}
    input,select,textarea{width:100%;padding:8px 12px;border:1px solid var(--border-m);border-radius:var(--rs);font-size:13px;font-family:'DM Sans',sans-serif;background:var(--white);color:var(--txt);margin-bottom:12px;transition:border-color .15s;}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--verde);}
    textarea{height:70px;resize:vertical;}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

    /* Ejercicios */
    .ex-item{background:var(--surf);border-radius:var(--rs);padding:.7rem .9rem;margin-bottom:.4rem;display:flex;align-items:flex-start;gap:10px;}
    .ex-num-s{width:24px;height:24px;border-radius:50%;background:var(--white);border:1px solid var(--border-m);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--txt-m);flex-shrink:0;margin-top:1px;}
    .ex-name-p{font-size:13px;font-weight:500;}
    .ex-det-p{font-size:11px;color:var(--txt-m);margin-top:2px;}
    .ex-tip-p{font-size:11px;color:var(--verde-d);margin-top:4px;}
    .ex-vid-p{font-size:11px;color:#185FA5;margin-top:2px;}

    /* Tabs */
    .day-tab-row{display:flex;gap:6px;margin-bottom:1rem;}
    .dtab{padding:6px 14px;border-radius:var(--rp);font-size:12px;font-weight:500;border:1px solid var(--border-m);background:var(--white);color:var(--txt-m);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
    .dtab.active{background:var(--verde);color:white;border-color:var(--verde);}
    .sem-tab-row{display:flex;gap:5px;margin-bottom:.75rem;flex-wrap:wrap;}
    .semtab{padding:4px 12px;border-radius:var(--rp);font-size:11px;border:1px solid var(--border-m);background:var(--white);color:var(--txt-m);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
    .semtab.active{background:var(--purp);color:var(--purp-d);border-color:transparent;font-weight:500;}

    /* Comentarios */
    .comment-box{background:var(--surf);border-radius:var(--rs);padding:.7rem .9rem;margin-bottom:.5rem;}
    .comment-meta{font-size:10px;color:var(--txt-m);margin-bottom:3px;}
    .comment-txt{font-size:12px;color:var(--txt);line-height:1.5;}
    .comment-day-label{font-size:11px;font-weight:500;color:var(--txt-m);margin-bottom:.5rem;}

    /* Link box */
    .link-box{background:var(--surf);border:1px solid var(--border-m);border-radius:var(--rs);padding:.6rem .9rem;font-size:12px;color:var(--verde-d);font-family:monospace;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:6px;}
    .copy-btn{background:none;border:none;font-size:11px;color:var(--txt-m);cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0;}
    .copy-btn:hover{color:var(--verde);}

    /* Foto upload */
    .foto-wrap{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
    .foto-preview{width:56px;height:56px;border-radius:50%;overflow:hidden;background:var(--verde-l);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:20px;color:var(--verde-d);flex-shrink:0;}
    .foto-preview img{width:100%;height:100%;object-fit:cover;}

    /* Nota badge */
    .nota-badge{background:var(--amber);border-radius:var(--rs);padding:.6rem .9rem;font-size:12px;color:var(--amber-d);margin-bottom:.75rem;}

    /* Progresión */
    .prog-badge{display:inline-flex;align-items:center;gap:4px;background:var(--purp);border-radius:var(--rp);padding:3px 10px;font-size:11px;color:var(--purp-d);margin-bottom:.75rem;}

    .save-msg{font-size:12px;color:var(--verde-d);margin-left:8px;}
    .err-msg{font-size:12px;color:var(--rojo-d);margin-left:8px;}
    .empty{font-size:13px;color:var(--txt-m);padding:.5rem 0;}
    .section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
    .section-hd-t{font-size:14px;font-weight:500;}

    @media(max-width:700px){.sidebar{display:none;}.main{padding:1rem;}.metrics{grid-template-columns:1fr 1fr;}}
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">A</div>
      <div><strong>Amira Fitness</strong><span>Panel</span></div>
    </div>
    <button class="nav active" onclick="setView('inicio')"><span class="nav-ic">🏠</span>Inicio</button>
    <button class="nav" onclick="setView('alumnas')"><span class="nav-ic">👤</span>Alumnas</button>
    <button class="nav" onclick="setView('rutinas')"><span class="nav-ic">📋</span>Rutinas</button>
    <button class="nav" onclick="setView('comentarios')"><span class="nav-ic">💬</span>Comentarios</button>
    <button class="nav" onclick="setView('links')"><span class="nav-ic">🔗</span>Links</button>
  </aside>
  <main class="main" id="main"><div class="empty">Cargando...</div></main>
</div>
<script>
const BASE=window.location.origin;
const COLORS=['teal','purple','amber','coral'];
let DB={alumnas:[],rutinas:{},comentarios:{},fotos:{}};
let S={view:'inicio',selA:null,selSem:1,selDia:1,addA:false,addEx:false,
  newA:{nombre:'',slug:'',tipo:'gym',dias:3,notas:'',foto:''},
  newEx:{nombre:'',series:'3',reps:'10',tip:'',video:''},
  saveMsg:'',saveErr:''};

function slugify(n){return n.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');}
function initials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function getA(id){return DB.alumnas.find(a=>a.id===id);}
function getEx(aId,sem,dia){try{return DB.rutinas[aId]?.[sem]?.find(d=>d.dia===dia)?.ejercicios||[];}catch(e){return[];}}

function ensureRutina(aId,sem){
  if(!DB.rutinas[aId])DB.rutinas[aId]={};
  if(!DB.rutinas[aId][sem])DB.rutinas[aId][sem]=[1,2,3].map(d=>({dia:d,ejercicios:[]}));
}

// Progresión automática: copia semana anterior si la nueva está vacía
function copiarSemanaAnterior(aId,sem){
  if(sem<=1)return false;
  const prev=DB.rutinas[aId]?.[sem-1];
  if(!prev)return false;
  ensureRutina(aId,sem);
  const curr=DB.rutinas[aId][sem];
  let copiado=false;
  curr.forEach((dayObj,i)=>{
    if(dayObj.ejercicios.length===0&&prev[i]){
      dayObj.ejercicios=JSON.parse(JSON.stringify(prev[i].ejercicios));
      copiado=true;
    }
  });
  return copiado;
}

function setView(v){
  S.view=v;
  document.querySelectorAll('.nav').forEach((el,i)=>{
    el.classList.toggle('active',['inicio','alumnas','rutinas','comentarios','links'][i]===v);
  });
  render();
}

function save(){
  try{
    localStorage.setItem('amira-alumnas',JSON.stringify(DB.alumnas));
    localStorage.setItem('amira-rutinas',JSON.stringify(DB.rutinas));
    localStorage.setItem('amira-fotos',JSON.stringify(DB.fotos));
    S.saveMsg='Guardado ✓';S.saveErr='';
    render();setTimeout(()=>{S.saveMsg='';render();},2000);
  }catch(e){S.saveErr='Error al guardar';render();}
}

function load(){
  try{
    const a=localStorage.getItem('amira-alumnas');
    const r=localStorage.getItem('amira-rutinas');
    const f=localStorage.getItem('amira-fotos');
    const c=localStorage.getItem('af-comentarios');
    if(a)DB.alumnas=JSON.parse(a);
    if(r)DB.rutinas=JSON.parse(r);
    if(f)DB.fotos=JSON.parse(f);
    if(c)DB.comentarios=JSON.parse(c);
    if(DB.alumnas.length>0)S.selA=DB.alumnas[0].id;
  }catch(e){}
}

async function loadFromServer(){
  try{
    const res=await fetch('/api/data.json');
    if(res.ok){
      const data=await res.json();
      if(data.alumnas&&data.alumnas.length>0){
        DB.alumnas=data.alumnas;
        DB.rutinas=data.rutinas||{};
        if(DB.alumnas.length>0)S.selA=DB.alumnas[0].id;
        // Merge comentarios del localStorage
        const c=localStorage.getItem('af-comentarios');
        if(c)DB.comentarios=JSON.parse(c);
        const f=localStorage.getItem('amira-fotos');
        if(f)DB.fotos=JSON.parse(f);
      }
    }
  }catch(e){}
}

function addAlumna(){
  if(!S.newA.nombre.trim())return;
  const id=Date.now();
  const slug=S.newA.slug||slugify(S.newA.nombre.split(' ')[0]);
  DB.alumnas.push({id,slug,nombre:S.newA.nombre,tipo:S.newA.tipo,dias:S.newA.dias,notas:S.newA.notas,foto:S.newA.foto,color:COLORS[DB.alumnas.length%COLORS.length]});
  S.newA={nombre:'',slug:'',tipo:'gym',dias:3,notas:'',foto:''};
  S.addA=false;
  if(!S.selA)S.selA=id;
  save();
}

function deleteAlumna(id){
  if(!confirm('¿Eliminás esta alumna y su rutina?'))return;
  DB.alumnas=DB.alumnas.filter(a=>a.id!==id);
  delete DB.rutinas[id];
  if(S.selA===id)S.selA=DB.alumnas[0]?.id||null;
  save();
}

function addEjercicio(){
  if(!S.newEx.nombre.trim())return;
  ensureRutina(S.selA,S.selSem);
  const day=DB.rutinas[S.selA][S.selSem].find(d=>d.dia===S.selDia);
  day.ejercicios.push({...S.newEx});
  S.newEx={nombre:'',series:'3',reps:'10',tip:'',video:''};
  S.addEx=false;
  render();
}

function deleteEjercicio(i){
  const day=DB.rutinas[S.selA][S.selSem].find(d=>d.dia===S.selDia);
  day.ejercicios.splice(i,1);render();
}

function copyLink(slug){
  const url=`${BASE}/alumna/${slug}`;
  navigator.clipboard.writeText(url).then(()=>{S.saveMsg='Link copiado ✓';render();setTimeout(()=>{S.saveMsg='';render();},1500);});
}

function handleFoto(aId,input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    DB.fotos[aId]=e.target.result;
    localStorage.setItem('amira-fotos',JSON.stringify(DB.fotos));
    // Actualizar la foto en alumnas también
    const a=getA(aId);
    if(a)a.foto=e.target.result;
    save();render();
  };
  reader.readAsDataURL(file);
}

function handleSemana(sem){
  S.selSem=sem;S.selDia=1;
  const a=getA(S.selA);
  if(a){
    ensureRutina(a.id,sem);
    const copiado=copiarSemanaAnterior(a.id,sem);
    if(copiado){S.saveMsg='Semana copiada de la anterior — editá lo que cambie';render();setTimeout(()=>{S.saveMsg='';render();},3000);return;}
  }
  render();
}

function avHtml(a){
  const foto=DB.fotos[a.id]||a.foto||'';
  return foto?`<img src="${foto}" alt="${a.nombre}">`:`${initials(a.nombre)}`;
}

function render(){
  const m=document.getElementById('main');
  if(S.view==='inicio')m.innerHTML=renderInicio();
  else if(S.view==='alumnas')m.innerHTML=renderAlumnas();
  else if(S.view==='rutinas')m.innerHTML=renderRutinas();
  else if(S.view==='comentarios')m.innerHTML=renderComentarios();
  else if(S.view==='links')m.innerHTML=renderLinks();
}

function renderInicio(){
  const gym=DB.alumnas.filter(a=>a.tipo==='gym').length;
  const dist=DB.alumnas.filter(a=>a.tipo==='distancia').length;
  const totalComents=Object.values(DB.comentarios).reduce((acc,arr)=>acc+arr.length,0);
  return`
    <div class="page-title">Bienvenida, Amira</div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">Alumnas</div><div class="metric-val">${DB.alumnas.length}</div></div>
      <div class="metric"><div class="metric-label">Gimnasio</div><div class="metric-val">${gym}</div></div>
      <div class="metric"><div class="metric-label">A distancia</div><div class="metric-val">${dist}</div></div>
      <div class="metric"><div class="metric-label">Comentarios</div><div class="metric-val green">${totalComents}</div></div>
    </div>
    <div class="card">
      <div class="card-title">Alumnas activas</div>
      ${DB.alumnas.length===0?'<div class="empty">Todavía no cargaste alumnas.</div>':''}
      ${DB.alumnas.map(a=>`
        <div class="arow">
          <div class="av av-${a.color}">${avHtml(a)}</div>
          <div><div class="aname">${a.nombre}</div><div class="asub"><span class="badge bg-${a.tipo==='gym'?'gym':'dist'}">${a.tipo==='gym'?'Gimnasio':'A distancia'}</span> · ${a.dias} días/sem</div></div>
          <div class="row-acts">
            <button class="btn btn-s" onclick="S.selA=${a.id};S.selDia=1;S.selSem=1;setView('rutinas')">Ver rutina</button>
          </div>
        </div>`).join('')}
    </div>`;
}

function renderAlumnas(){
  return`
    <div class="page-title">Alumnas</div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:1rem;">
      <button class="btn btn-p btn-s" onclick="S.addA=!S.addA;render()">+ Nueva alumna</button>
    </div>
    ${S.addA?`
    <div class="card" style="margin-bottom:1rem;">
      <div class="card-title">Nueva alumna</div>
      <label>Nombre completo</label>
      <input type="text" placeholder="Ej: Laura Gómez" value="${S.newA.nombre}"
        oninput="S.newA.nombre=this.value;const el=document.getElementById('slug-prev');if(el)el.textContent=slugify(this.value.split(' ')[0])||'nombre'">
      <label>Link personalizado</label>
      <div style="font-size:12px;color:var(--verde-d);margin-bottom:12px;font-family:monospace;">
        ${BASE}/alumna/<span id="slug-prev">${slugify(S.newA.nombre.split(' ')[0])||'nombre'}</span>
      </div>
      <div class="frow">
        <div><label>Tipo</label><select onchange="S.newA.tipo=this.value"><option value="gym">Gimnasio</option><option value="distancia">A distancia</option></select></div>
        <div><label>Días/semana</label><select onchange="S.newA.dias=parseInt(this.value)"><option value="2">2 días</option><option value="3" selected>3 días</option></select></div>
      </div>
      <label>Notas</label>
      <textarea placeholder="Lesiones, objetivos..." oninput="S.newA.notas=this.value">${S.newA.notas}</textarea>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-p btn-s" onclick="addAlumna()">Guardar</button>
        <button class="btn btn-s" onclick="S.addA=false;render()">Cancelar</button>
      </div>
    </div>`:''}
    ${DB.alumnas.map(a=>`
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:.75rem;">
        <div class="av av-${a.color}">${avHtml(a)}</div>
        <div style="flex:1"><div class="aname">${a.nombre}</div><div class="asub"><span class="badge bg-${a.tipo==='gym'?'gym':'dist'}">${a.tipo==='gym'?'Gimnasio':'A distancia'}</span> · ${a.dias} días/sem</div></div>
        <button class="btn btn-s btn-d" onclick="deleteAlumna(${a.id})">Eliminar</button>
      </div>
      ${a.notas?`<div class="nota-badge">${a.notas}</div>`:''}
      <div style="margin-bottom:.75rem;">
        <label>Foto de perfil</label>
        <div class="foto-wrap">
          <div class="foto-preview av-${a.color}">${avHtml(a)}</div>
          <input type="file" accept="image/*" style="width:auto;margin-bottom:0;" onchange="handleFoto(${a.id},this)">
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-p btn-s" onclick="S.selA=${a.id};S.selDia=1;S.selSem=1;setView('rutinas')">Gestionar rutina</button>
        <button class="btn btn-s" onclick="copyLink('${a.slug}')">Copiar link</button>
      </div>
    </div>`).join('')}
    ${S.saveMsg?`<div class="save-msg">${S.saveMsg}</div>`:''}`;
}

function renderRutinas(){
  const a=getA(S.selA);
  if(!a)return`<div class="page-title">Rutinas</div><div class="empty">Seleccioná una alumna primero.</div>`;
  ensureRutina(a.id,S.selSem);
  const ejercicios=getEx(a.id,S.selSem,S.selDia);
  const semanas=[1,2,3,4];
  return`
    <div class="page-title">Rutinas</div>
    <div style="display:flex;gap:7px;margin-bottom:1.25rem;flex-wrap:wrap;">
      ${DB.alumnas.map(al=>`<button class="btn btn-s${S.selA===al.id?' btn-p':''}" onclick="S.selA=${al.id};S.selDia=1;S.selSem=1;render()">${al.nombre.split(' ')[0]}</button>`).join('')}
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;">
        <div class="av av-${a.color}">${avHtml(a)}</div>
        <div><div class="aname">${a.nombre}</div><div class="asub">${a.tipo==='gym'?'Gimnasio':'A distancia'} · ${a.dias} días/sem</div></div>
      </div>
      <div style="font-size:11px;color:var(--txt-m);margin-bottom:4px;">Semana</div>
      <div class="sem-tab-row">
        ${semanas.map(s=>`<button class="semtab${S.selSem===s?' active':''}" onclick="handleSemana(${s})">${s===1?'Semana 1':'Semana '+s+(s>1?' ↗':'')}</button>`).join('')}
      </div>
      <div class="prog-badge">Semana ${S.selSem} ${S.selSem>1?'— copiada de la anterior al crear':'— rutina base'}</div>
      <div style="font-size:11px;color:var(--txt-m);margin-bottom:4px;">Día</div>
      <div class="day-tab-row">
        ${[1,2,3].slice(0,a.dias).map(d=>`<button class="dtab${S.selDia===d?' active':''}" onclick="S.selDia=${d};render()">Día ${d}</button>`).join('')}
      </div>
      <div class="section-hd">
        <div class="section-hd-t">Ejercicios (${ejercicios.length})</div>
        <button class="btn btn-p btn-s" onclick="S.addEx=!S.addEx;render()">+ Agregar</button>
      </div>
      ${S.addEx?`
      <div class="card" style="background:var(--surf);margin-bottom:.75rem;">
        <label>Nombre del ejercicio</label>
        <input type="text" placeholder="Ej: Sentadilla al cajón" value="${S.newEx.nombre}" oninput="S.newEx.nombre=this.value">
        <div class="frow">
          <div><label>Series</label><input type="text" value="${S.newEx.series}" oninput="S.newEx.series=this.value" placeholder="3"></div>
          <div><label>Reps / tiempo</label><input type="text" value="${S.newEx.reps}" oninput="S.newEx.reps=this.value" placeholder="10"></div>
        </div>
        <label>Nota de técnica</label>
        <textarea placeholder="Indicaciones para la alumna..." oninput="S.newEx.tip=this.value">${S.newEx.tip}</textarea>
        <label>Link de video (YouTube)</label>
        <input type="text" value="${S.newEx.video}" oninput="S.newEx.video=this.value" placeholder="https://youtube.com/shorts/...">
        <div style="display:flex;gap:8px;">
          <button class="btn btn-p btn-s" onclick="addEjercicio()">Guardar ejercicio</button>
          <button class="btn btn-s" onclick="S.addEx=false;render()">Cancelar</button>
        </div>
      </div>`:''}
      ${ejercicios.length===0?'<div class="empty">Sin ejercicios en este día.</div>':''}
      ${ejercicios.map((ex,i)=>`
      <div class="ex-item">
        <div class="ex-num-s">${i+1}</div>
        <div style="flex:1">
          <div class="ex-name-p">${ex.nombre}</div>
          <div class="ex-det-p">${ex.series} series × ${ex.reps}</div>
          ${ex.tip?`<div class="ex-tip-p">${ex.tip}</div>`:''}
          ${ex.video?`<div class="ex-vid-p">Video vinculado ✓</div>`:''}
        </div>
        <button class="btn btn-s btn-d" onclick="deleteEjercicio(${i})">×</button>
      </div>`).join('')}
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="btn btn-p" onclick="save()">Guardar cambios</button>
      ${S.saveMsg?`<span class="save-msg">${S.saveMsg}</span>`:''}
      ${S.saveErr?`<span class="err-msg">${S.saveErr}</span>`:''}
    </div>`;
}

function renderComentarios(){
  const totalComents=Object.values(DB.comentarios).reduce((acc,arr)=>acc+arr.length,0);
  return`
    <div class="page-title">Comentarios de alumnas</div>
    ${totalComents===0?`
    <div class="card">
      <div class="empty">Todavía no hay comentarios. Aparecerán acá cuando las alumnas dejen una nota al terminar el día.</div>
    </div>`:''}
    ${DB.alumnas.map(a=>{
      const comsAlumna=Object.entries(DB.comentarios)
        .filter(([k])=>k.startsWith(a.id+'-'))
        .flatMap(([k,arr])=>{
          const parts=k.split('-');
          return arr.map(c=>({...c,semana:parts[1],dia:parts[2]}));
        });
      if(comsAlumna.length===0)return'';
      return`
      <div class="card">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;">
          <div class="av av-${a.color}">${avHtml(a)}</div>
          <div><div class="aname">${a.nombre}</div><div class="asub">${comsAlumna.length} comentario${comsAlumna.length!==1?'s':''}</div></div>
        </div>
        ${comsAlumna.map(c=>`
          <div class="comment-box">
            <div class="comment-meta">Semana ${c.semana} · Día ${c.dia} · ${c.fecha}</div>
            <div class="comment-txt">${c.texto}</div>
          </div>`).join('')}
      </div>`;
    }).join('')}`;
}

function renderLinks(){
  return`
    <div class="page-title">Links por alumna</div>
    <div class="card" style="background:var(--verde-l);border-color:var(--verde-m);margin-bottom:1rem;">
      <div style="font-size:13px;color:var(--verde-d);line-height:1.6;">Copiá el link de cada alumna y mandáselo por WhatsApp. Ella lo guarda en el celu y accede a su rutina con un toque.</div>
    </div>
    ${DB.alumnas.length===0?'<div class="empty">Sin alumnas cargadas todavía.</div>':''}
    ${DB.alumnas.map(a=>`
    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:.75rem;">
        <div class="av av-${a.color}">${avHtml(a)}</div>
        <div><div class="aname">${a.nombre}</div><div class="asub"><span class="badge bg-${a.tipo==='gym'?'gym':'dist'}">${a.tipo==='gym'?'Gimnasio':'A distancia'}</span></div></div>
      </div>
      <div class="link-box">
        <span>${BASE}/alumna/${a.slug}</span>
        <button class="copy-btn" onclick="copyLink('${a.slug}')">Copiar</button>
      </div>
    </div>`).join('')}
    ${S.saveMsg?`<div class="save-msg" style="margin-top:.5rem;">${S.saveMsg}</div>`:''}`;
}

async function init(){
  load();
  await loadFromServer();
  render();
}
init();
</script>
</body>
</html>
