<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Mi rutina — Amira Fitness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --verde:#1D9E75;--verde-l:#E1F5EE;--verde-m:#5DCAA5;--verde-d:#0F6E56;
      --purp:#EEEDFE;--purp-d:#3C3489;
      --amber:#FAEEDA;--amber-d:#633806;
      --rojo-l:#FCEBEB;--rojo-d:#A32D2D;
      --txt:#1a1a1a;--txt-m:#6b7280;--txt-h:#9ca3af;
      --border:rgba(0,0,0,0.07);--border-m:rgba(0,0,0,0.12);
      --surf:#f8f8f6;--white:#fff;
      --r:16px;--rs:10px;--rp:30px;
    }
    body{font-family:'DM Sans',sans-serif;background:var(--surf);color:var(--txt);min-height:100vh;}
    .app{max-width:430px;margin:0 auto;padding-bottom:4rem;}

    .header{background:var(--white);border-bottom:1px solid var(--border);padding:1rem 1.25rem 0.9rem;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;}
    .logo{width:36px;height:36px;border-radius:50%;background:var(--verde-l);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:15px;color:var(--verde-d);flex-shrink:0;}
    .header h1{font-size:14px;font-weight:500;}
    .header p{font-size:11px;color:var(--txt-m);}

    .screen{padding:1rem 1.25rem;}

    /* Alumna hero */
    .hero{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;display:flex;align-items:center;gap:12px;margin-bottom:0.85rem;animation:fu .3s ease;}
    .av-wrap{position:relative;flex-shrink:0;}
    .av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:18px;overflow:hidden;}
    .av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
    .av-teal{background:var(--verde-l);color:var(--verde-d);}
    .av-purple{background:var(--purp);color:var(--purp-d);}
    .av-amber{background:var(--amber);color:var(--amber-d);}
    .hero h2{font-size:15px;font-weight:500;margin-bottom:2px;}
    .hero p{font-size:11px;color:var(--txt-m);}

    /* Warmup */
    .warmup{background:var(--amber);border-radius:var(--rs);padding:.75rem 1rem;margin-bottom:.85rem;animation:fu .35s ease;}
    .warmup-title{font-size:10px;font-weight:500;color:var(--amber-d);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
    .warmup a{font-size:12px;color:var(--amber-d);display:flex;align-items:center;gap:6px;text-decoration:none;margin-top:4px;font-weight:500;}
    .play{width:18px;height:18px;border-radius:50%;background:var(--amber-d);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
    .play::after{content:'';border-left:5px solid var(--amber);border-top:3px solid transparent;border-bottom:3px solid transparent;margin-left:2px;}

    /* Tabs */
    .day-tabs{display:flex;gap:6px;margin-bottom:.85rem;}
    .dtab{flex:1;padding:9px 4px;border-radius:var(--rp);font-size:12px;font-weight:500;border:1px solid var(--border-m);background:var(--white);color:var(--txt-m);cursor:pointer;text-align:center;transition:all .2s;font-family:'DM Sans',sans-serif;}
    .dtab.active{background:var(--verde);color:white;border-color:var(--verde);}

    .sem-row{display:flex;gap:5px;margin-bottom:.75rem;flex-wrap:wrap;}
    .stab{padding:4px 12px;border-radius:var(--rp);font-size:11px;border:1px solid var(--border-m);background:var(--white);color:var(--txt-m);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
    .stab.active{background:var(--purp);color:var(--purp-d);border-color:transparent;font-weight:500;}

    /* Progress */
    .prog-wrap{margin-bottom:1rem;}
    .prog-top{display:flex;justify-content:space-between;font-size:11px;color:var(--txt-m);margin-bottom:5px;}
    .prog-bar{height:6px;background:rgba(0,0,0,0.06);border-radius:99px;overflow:hidden;}
    .prog-fill{height:100%;background:var(--verde);border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1);}

    .day-lbl{font-size:10px;font-weight:500;color:var(--txt-m);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.6rem;}

    /* Exercise */
    .ex-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:.8rem 1rem;margin-bottom:.5rem;transition:all .25s;animation:fu .25s ease;}
    .ex-card.done{background:var(--verde-l);border-color:var(--verde-m);}
    .ex-top{display:flex;align-items:center;gap:10px;cursor:pointer;}
    .ex-num{width:28px;height:28px;border-radius:50%;background:var(--surf);border:1px solid var(--border-m);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--txt-m);flex-shrink:0;transition:all .25s;}
    .ex-card.done .ex-num{background:var(--verde);color:white;border-color:var(--verde);}
    .ex-name{font-size:13px;font-weight:500;flex:1;}
    .ex-detail{font-size:11px;color:var(--txt-m);margin-top:3px;}
    .ex-btns{display:flex;gap:6px;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
    .btn-tip{background:var(--purp);border:none;border-radius:var(--rs);padding:5px 11px;font-size:11px;color:var(--purp-d);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;}
    .btn-vid{background:var(--rojo-l);border:none;border-radius:var(--rs);padding:5px 11px;font-size:11px;color:var(--rojo-d);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;text-decoration:none;display:inline-flex;align-items:center;gap:3px;}
    .btn-check{margin-left:auto;background:var(--surf);border:1px solid var(--border-m);border-radius:var(--rs);padding:5px 11px;font-size:11px;color:var(--txt-m);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s;}
    .ex-card.done .btn-check{background:var(--verde-l);color:var(--verde-d);border-color:var(--verde-m);}
    .tip-txt{font-size:12px;color:var(--verde-d);background:var(--verde-l);border-radius:var(--rs);padding:8px 10px;margin-top:8px;line-height:1.55;display:none;}
    .tip-txt.show{display:block;animation:fu .2s ease;}

    /* Comentario del día */
    .comment-section{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:1rem;margin-top:1rem;animation:fu .3s ease;}
    .comment-title{font-size:12px;font-weight:500;color:var(--txt);margin-bottom:8px;}
    .comment-hint{font-size:11px;color:var(--txt-m);margin-bottom:8px;line-height:1.5;}
    .comment-list{margin-bottom:8px;}
    .comment-item{background:var(--surf);border-radius:var(--rs);padding:8px 10px;margin-bottom:6px;font-size:12px;color:var(--txt);line-height:1.5;}
    .comment-item .comment-meta{font-size:10px;color:var(--txt-h);margin-bottom:3px;}
    .comment-input-wrap{display:flex;gap:6px;}
    .comment-input{flex:1;padding:8px 10px;border:1px solid var(--border-m);border-radius:var(--rs);font-size:12px;font-family:'DM Sans',sans-serif;color:var(--txt);background:var(--surf);resize:none;}
    .comment-input:focus{outline:none;border-color:var(--verde);}
    .btn-send{background:var(--verde);color:white;border:none;border-radius:var(--rs);padding:8px 14px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}

    /* Done banner */
    .done-banner{text-align:center;padding:1.25rem 0 .5rem;font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--verde-d);animation:fu .4s ease;}
    .nota{background:var(--amber);border-radius:var(--rs);padding:.7rem 1rem;font-size:12px;color:var(--amber-d);line-height:1.55;margin-top:1rem;}

    /* Not found / loading */
    .not-found{text-align:center;padding:3rem 1rem;}
    .not-found h2{font-family:'DM Serif Display',serif;font-size:1.5rem;margin-bottom:.5rem;}
    .not-found p{font-size:13px;color:var(--txt-m);}
    .loading{text-align:center;padding:3rem 1rem;color:var(--txt-m);font-size:13px;}

    @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">A</div>
    <div><h1>Amira Fitness</h1><p>Tu entrenamiento personalizado</p></div>
  </div>
  <div class="screen" id="screen"><div class="loading">Cargando tu rutina...</div></div>
</div>
<script>
const slug = location.pathname.split('/').filter(Boolean).pop()||'';
let DB = {alumnas:[],rutinas:{},comentarios:{},fotos:{}};
let selSemana=1,selDia=1;
let done={},expanded={};

function initials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function dKey(aId,s,d,i){return `${aId}-${s}-${d}-${i}`;}
function eKey(aId,s,d,i){return `exp-${aId}-${s}-${d}-${i}`;}
function cKey(aId,s,d){return `${aId}-${s}-${d}`;}

function getAlumna(){
  return DB.alumnas.find(a=>a.slug===slug||a.nombre.toLowerCase().split(' ')[0]===slug);
}
function getEjercicios(aId){
  try{return DB.rutinas[aId]?.[selSemana]?.find(d=>d.dia===selDia)?.ejercicios||[];}catch(e){return [];}
}
function getComentarios(aId){
  return DB.comentarios[cKey(aId,selSemana,selDia)]||[];
}

function toggleDone(aId,i){
  const k=dKey(aId,selSemana,selDia,i);
  done[k]=!done[k];
  saveDone();render();
}
function toggleExp(aId,i){
  const k=eKey(aId,selSemana,selDia,i);
  expanded[k]=!expanded[k];render();
}
function saveDone(){try{localStorage.setItem('af-done',JSON.stringify(done));}catch(e){}}
function loadDone(){try{const d=localStorage.getItem('af-done');if(d)done=JSON.parse(d);}catch(e){}}

function saveComment(aId,text){
  if(!text.trim())return;
  const k=cKey(aId,selSemana,selDia);
  if(!DB.comentarios[k])DB.comentarios[k]=[];
  const now=new Date();
  const fecha=`${now.getDate()}/${now.getMonth()+1} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  DB.comentarios[k].push({texto:text.trim(),fecha});
  localStorage.setItem('af-comentarios',JSON.stringify(DB.comentarios));
  render();
}

function render(){
  const screen=document.getElementById('screen');
  const a=getAlumna();
  if(!a){
    screen.innerHTML=`<div class="not-found"><div style="font-size:2rem;margin-bottom:.75rem">🤔</div><h2>Rutina no encontrada</h2><p>Este link no corresponde a ninguna alumna.<br>Pedile a Amira que te reenvíe tu link.</p></div>`;
    return;
  }
  document.title=`Rutina de ${a.nombre.split(' ')[0]} — Amira Fitness`;
  const ejercicios=getEjercicios(a.id);
  const completados=ejercicios.filter((_,i)=>done[dKey(a.id,selSemana,selDia,i)]).length;
  const total=ejercicios.length;
  const pct=total>0?Math.round((completados/total)*100):0;
  const semanas=Object.keys(DB.rutinas[a.id]||{'1':[]}).map(Number);
  const comentarios=getComentarios(a.id);

  const fotoSrc=DB.fotos[a.id]||a.foto||'';
  const avHtml=fotoSrc
    ?`<img src="${fotoSrc}" alt="${a.nombre}">`
    :initials(a.nombre);

  let html=`
    <div class="hero">
      <div class="av-wrap"><div class="av av-${a.color||'teal'}">${avHtml}</div></div>
      <div><h2>Hola, ${a.nombre.split(' ')[0]} 👋</h2><p>${a.tipo==='gym'?'Gimnasio':'A distancia'} · ${a.dias} días por semana</p></div>
    </div>
    <div class="warmup">
      <div class="warmup-title">Entrada en calor — hacé esto primero</div>
      <a href="https://youtu.be/x4NkmMOVZkc" target="_blank"><span class="play"></span>Movimiento articular</a>
      <a href="https://youtu.be/QjjuSQm61SA" target="_blank"><span class="play"></span>Entrada en calor sin impacto</a>
    </div>
    ${semanas.length>1?`<div class="sem-row">${semanas.map(s=>`<button class="stab${selSemana===s?' active':''}" onclick="selSemana=${s};selDia=1;render()">Semana ${s}</button>`).join('')}</div>`:''}
    <div class="day-tabs">
      ${[1,2,3].slice(0,a.dias).map(d=>`<button class="dtab${selDia===d?' active':''}" onclick="selDia=${d};render()">Día ${d}</button>`).join('')}
    </div>
    <div class="prog-wrap">
      <div class="prog-top"><span>${completados} de ${total} ejercicios</span><span>${pct}%</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="day-lbl">Día ${selDia} · Semana ${selSemana}</div>`;

  if(ejercicios.length===0){
    html+=`<div style="font-size:13px;color:var(--txt-m);padding:1rem 0;text-align:center;">Sin ejercicios para este día todavía.</div>`;
  }

  ejercicios.forEach((ex,i)=>{
    const isDone=!!done[dKey(a.id,selSemana,selDia,i)];
    const isExp=!!expanded[eKey(a.id,selSemana,selDia,i)];
    html+=`
      <div class="ex-card${isDone?' done':''}">
        <div class="ex-top" onclick="toggleDone(${a.id},${i})">
          <div class="ex-num">${isDone?'✓':i+1}</div>
          <div style="flex:1"><div class="ex-name">${ex.nombre}</div><div class="ex-detail">${ex.series} series × ${ex.reps}</div></div>
        </div>
        <div class="ex-btns">
          ${ex.tip?`<button class="btn-tip" onclick="toggleExp(${a.id},${i})">${isExp?'Ocultar':'Ver técnica'}</button>`:''}
          ${ex.video?`<a class="btn-vid" href="${ex.video}" target="_blank">▶ Video</a>`:''}
          <button class="btn-check" onclick="toggleDone(${a.id},${i})">${isDone?'✓ Hecho':'Marcar hecho'}</button>
        </div>
        ${ex.tip?`<div class="tip-txt${isExp?' show':''}">${ex.tip}</div>`:''}
      </div>`;
  });

  if(total>0&&completados===total){
    html+=`<div class="done-banner">¡Excelente, ${a.nombre.split(' ')[0]}! Completaste el día 🎉</div>`;
  }

  // Sección de comentarios
  html+=`
    <div class="comment-section">
      <div class="comment-title">¿Cómo te fue hoy?</div>
      <div class="comment-hint">Dejale una nota a Amira — pesos usados, cómo te sentiste, algo que te costó.</div>
      ${comentarios.length>0?`<div class="comment-list">${comentarios.map(c=>`<div class="comment-item"><div class="comment-meta">${c.fecha}</div>${c.texto}</div>`).join('')}</div>`:''}
      <div class="comment-input-wrap">
        <textarea class="comment-input" id="comment-input" placeholder="Ej: Aumenté a 10kg en sentadilla. El dead bug me cuesta." rows="2"></textarea>
        <button class="btn-send" onclick="enviarComentario(${a.id})">Enviar</button>
      </div>
    </div>`;

  if(a.notas){
    html+=`<div class="nota">💬 ${a.notas}</div>`;
  }

  screen.innerHTML=html;
}

function enviarComentario(aId){
  const inp=document.getElementById('comment-input');
  if(!inp||!inp.value.trim())return;
  saveComment(aId,inp.value);
}

async function init(){
  loadDone();
  try{
    const res=await fetch('/api/data.json');
    if(res.ok){
      const data=await res.json();
      DB.alumnas=data.alumnas||[];
      DB.rutinas=data.rutinas||{};
    }
  }catch(e){}
  // Merge con localStorage
  if(DB.alumnas.length===0){
    DB.alumnas=JSON.parse(localStorage.getItem('amira-alumnas')||'[]');
    DB.rutinas=JSON.parse(localStorage.getItem('amira-rutinas')||'{}');
  }
  try{
    const c=localStorage.getItem('af-comentarios');
    if(c)DB.comentarios=JSON.parse(c);
    const f=localStorage.getItem('af-fotos');
    if(f)DB.fotos=JSON.parse(f);
  }catch(e){}
  render();
}
init();
</script>
</body>
</html>
