<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel — Amira Fitness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde: #1D9E75;
      --verde-light: #E1F5EE;
      --verde-mid: #5DCAA5;
      --verde-dark: #0F6E56;
      --purpura: #EEEDFE;
      --purpura-dark: #3C3489;
      --amber: #FAEEDA;
      --amber-dark: #633806;
      --rojo-light: #FCEBEB;
      --rojo-dark: #A32D2D;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --border: rgba(0,0,0,0.07);
      --border-md: rgba(0,0,0,0.12);
      --surface: #f8f8f6;
      --white: #ffffff;
      --radius: 14px;
      --radius-sm: 9px;
      --radius-pill: 30px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text); }
    .layout { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--white);
      border-right: 1px solid var(--border);
      padding: 1.5rem 1rem;
      display: flex; flex-direction: column; gap: 4px;
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 1.5rem; padding: 0 0.5rem;
    }
    .logo {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--verde-light);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 14px; color: var(--verde-dark);
    }
    .brand-txt strong { font-size: 14px; font-weight: 500; display: block; }
    .brand-txt span { font-size: 11px; color: var(--text-muted); }
    .nav-item {
      display: flex; align-items: center; gap: 8px;
      padding: 0.6rem 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 13px; color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      border: none; background: none; width: 100%; text-align: left;
      font-family: 'DM Sans', sans-serif;
    }
    .nav-item:hover { background: var(--surface); color: var(--text); }
    .nav-item.active { background: var(--verde-light); color: var(--verde-dark); font-weight: 500; }
    .nav-icon { width: 18px; text-align: center; font-size: 14px; }

    /* Main */
    .main { flex: 1; padding: 2rem; overflow-y: auto; }
    .page-title { font-family: 'DM Serif Display', serif; font-size: 1.6rem; margin-bottom: 1.5rem; }

    /* Cards */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }
    .card-title { font-size: 13px; font-weight: 500; margin-bottom: 1rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

    /* Metrics */
    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
    .metric {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem 1.25rem;
    }
    .metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .metric-val { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--text); }

    /* Alumna rows */
    .alumna-row {
      display: flex; align-items: center; gap: 12px;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    .alumna-row:last-child { border-bottom: none; }
    .av {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      flex-shrink: 0;
    }
    .av-teal { background: var(--verde-light); color: var(--verde-dark); }
    .av-purple { background: var(--purpura); color: var(--purpura-dark); }
    .av-amber { background: var(--amber); color: var(--amber-dark); }
    .av-coral { background: #FAECE7; color: #712B13; }
    .alumna-name { font-size: 14px; font-weight: 500; }
    .alumna-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .badge {
      font-size: 10px; padding: 2px 9px;
      border-radius: var(--radius-pill);
      font-weight: 500;
    }
    .badge-gym { background: var(--verde-light); color: var(--verde-dark); }
    .badge-dist { background: var(--purpura); color: var(--purpura-dark); }
    .row-actions { margin-left: auto; display: flex; gap: 6px; }

    /* Buttons */
    .btn {
      padding: 7px 14px;
      border-radius: var(--radius-pill);
      font-size: 12px; font-weight: 500;
      border: 1px solid var(--border-md);
      background: var(--white);
      color: var(--text);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }
    .btn:hover { background: var(--surface); }
    .btn-primary { background: var(--verde); color: white; border-color: var(--verde); }
    .btn-primary:hover { background: var(--verde-dark); }
    .btn-danger { color: var(--rojo-dark); border-color: #F09595; }
    .btn-danger:hover { background: var(--rojo-light); }
    .btn-sm { padding: 4px 11px; font-size: 11px; }

    /* Link box */
    .link-box {
      background: var(--surface);
      border: 1px solid var(--border-md);
      border-radius: var(--radius-sm);
      padding: 0.6rem 0.9rem;
      font-size: 12px;
      color: var(--verde-dark);
      font-family: monospace;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      margin-top: 6px;
    }
    .copy-btn {
      background: none; border: none;
      font-size: 11px; color: var(--text-muted);
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      flex-shrink: 0;
    }
    .copy-btn:hover { color: var(--verde); }

    /* Form */
    label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 4px; }
    input, select, textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border-md);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      background: var(--white);
      color: var(--text);
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--verde); }
    textarea { height: 70px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Exercise item */
    .ex-item {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 0.7rem 0.9rem;
      margin-bottom: 0.4rem;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .ex-num-sm {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--white);
      border: 1px solid var(--border-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 500; color: var(--text-muted);
      flex-shrink: 0; margin-top: 1px;
    }
    .ex-name { font-size: 13px; font-weight: 500; }
    .ex-detail { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .ex-tip { font-size: 11px; color: var(--verde-dark); margin-top: 4px; }
    .ex-vid { font-size: 11px; color: #185FA5; margin-top: 2px; }

    /* Day tabs */
    .day-tab-row { display: flex; gap: 6px; margin-bottom: 1rem; }
    .day-tab {
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      font-size: 12px; font-weight: 500;
      border: 1px solid var(--border-md);
      background: var(--white);
      color: var(--text-muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }
    .day-tab.active { background: var(--verde); color: white; border-color: var(--verde); }

    .semana-tab-row { display: flex; gap: 5px; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .sem-tab {
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      font-size: 11px;
      border: 1px solid var(--border-md);
      background: var(--white);
      color: var(--text-muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
    .sem-tab.active { background: var(--purpura); color: var(--purpura-dark); border-color: transparent; font-weight: 500; }

    .section-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .section-hd-title { font-size: 14px; font-weight: 500; }

    .nota-box { background: var(--amber); border-radius: var(--radius-sm); padding: 0.6rem 0.9rem; font-size: 12px; color: var(--amber-dark); margin-bottom: 0.75rem; }

    .save-msg { font-size: 12px; color: var(--verde-dark); margin-left: 8px; }
    .err-msg { font-size: 12px; color: var(--rojo-dark); margin-left: 8px; }

    .empty { font-size: 13px; color: var(--text-muted); padding: 0.5rem 0; }

    @media (max-width: 700px) {
      .sidebar { display: none; }
      .main { padding: 1rem; }
      .metrics { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">A</div>
      <div class="brand-txt">
        <strong>Amira Fitness</strong>
        <span>Panel</span>
      </div>
    </div>
    <button class="nav-item active" onclick="setView('inicio')"><span class="nav-icon">🏠</span> Inicio</button>
    <button class="nav-item" onclick="setView('alumnas')"><span class="nav-icon">👤</span> Alumnas</button>
    <button class="nav-item" onclick="setView('rutinas')"><span class="nav-icon">📋</span> Rutinas</button>
    <button class="nav-item" onclick="setView('links')"><span class="nav-icon">🔗</span> Links</button>
  </aside>

  <main class="main" id="main">
    <div class="empty">Cargando...</div>
  </main>
</div>

<script>
const COLORS = ['teal','purple','amber','coral'];
const BASE_URL = window.location.origin;

let state = {
  view: 'inicio',
  alumnas: [],
  rutinas: {},
  selAlumna: null,
  selSemana: 1,
  selDia: 1,
  addingAlumna: false,
  addingEx: false,
  newAlumna: { nombre:'', slug:'', tipo:'gym', dias:3, notas:'' },
  newEx: { nombre:'', series:'3', reps:'10', tip:'', video:'' },
  saveMsg: '', saveErr: '',
};

function slugify(n) {
  return n.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
}
function initials(n) { return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function getAlumna(id) { return state.alumnas.find(a=>a.id===id); }

function getEjercicios(aId, sem, dia) {
  try { return state.rutinas[aId]?.[sem]?.find(d=>d.dia===dia)?.ejercicios || []; } catch(e) { return []; }
}

function ensureRutina(aId, sem) {
  if (!state.rutinas[aId]) state.rutinas[aId] = {};
  if (!state.rutinas[aId][sem]) {
    state.rutinas[aId][sem] = [1,2,3].map(d=>({dia:d, ejercicios:[]}));
  }
}

function setView(v) {
  state.view = v;
  document.querySelectorAll('.nav-item').forEach((el,i) => {
    el.classList.toggle('active', ['inicio','alumnas','rutinas','links'][i] === v);
  });
  render();
}

function save() {
  try {
    localStorage.setItem('amira-alumnas', JSON.stringify(state.alumnas));
    localStorage.setItem('amira-rutinas', JSON.stringify(state.rutinas));
    state.saveMsg = 'Guardado ✓';
    state.saveErr = '';
    render();
    setTimeout(()=>{ state.saveMsg=''; render(); }, 2000);
  } catch(e) {
    state.saveErr = 'Error al guardar';
    render();
  }
}

function load() {
  try {
    const a = localStorage.getItem('amira-alumnas');
    const r = localStorage.getItem('amira-rutinas');
    if (a) state.alumnas = JSON.parse(a);
    if (r) state.rutinas = JSON.parse(r);
    if (state.alumnas.length > 0) state.selAlumna = state.alumnas[0].id;
  } catch(e) {}
}

function addAlumna() {
  if (!state.newAlumna.nombre.trim()) return;
  const id = Date.now();
  const slug = state.newAlumna.slug || slugify(state.newAlumna.nombre.split(' ')[0]);
  state.alumnas.push({
    id, slug,
    nombre: state.newAlumna.nombre,
    tipo: state.newAlumna.tipo,
    dias: state.newAlumna.dias,
    notas: state.newAlumna.notas,
    color: COLORS[state.alumnas.length % COLORS.length],
  });
  state.newAlumna = { nombre:'', slug:'', tipo:'gym', dias:3, notas:'' };
  state.addingAlumna = false;
  if (!state.selAlumna) state.selAlumna = id;
  save();
}

function deleteAlumna(id) {
  if (!confirm('¿Eliminás a esta alumna y su rutina?')) return;
  state.alumnas = state.alumnas.filter(a=>a.id!==id);
  delete state.rutinas[id];
  if (state.selAlumna === id) state.selAlumna = state.alumnas[0]?.id || null;
  save();
}

function addEjercicio() {
  if (!state.newEx.nombre.trim()) return;
  ensureRutina(state.selAlumna, state.selSemana);
  const day = state.rutinas[state.selAlumna][state.selSemana].find(d=>d.dia===state.selDia);
  day.ejercicios.push({...state.newEx});
  state.newEx = { nombre:'', series:'3', reps:'10', tip:'', video:'' };
  state.addingEx = false;
  render();
}

function deleteEjercicio(i) {
  const day = state.rutinas[state.selAlumna][state.selSemana].find(d=>d.dia===state.selDia);
  day.ejercicios.splice(i,1);
  render();
}

function copyLink(slug) {
  const url = `${BASE_URL}/alumna/${slug}`;
  navigator.clipboard.writeText(url).then(()=>{
    state.saveMsg = 'Link copiado ✓';
    render();
    setTimeout(()=>{ state.saveMsg=''; render(); }, 1500);
  });
}

function render() {
  const m = document.getElementById('main');
  if (state.view==='inicio') m.innerHTML = renderInicio();
  else if (state.view==='alumnas') m.innerHTML = renderAlumnas();
  else if (state.view==='rutinas') m.innerHTML = renderRutinas();
  else if (state.view==='links') m.innerHTML = renderLinks();
}

function renderInicio() {
  const gym = state.alumnas.filter(a=>a.tipo==='gym').length;
  const dist = state.alumnas.filter(a=>a.tipo==='distancia').length;
  return `
    <div class="page-title">Bienvenida, Amira</div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">Alumnas</div><div class="metric-val">${state.alumnas.length}</div></div>
      <div class="metric"><div class="metric-label">Gimnasio</div><div class="metric-val">${gym}</div></div>
      <div class="metric"><div class="metric-label">A distancia</div><div class="metric-val">${dist}</div></div>
    </div>
    <div class="card">
      <div class="card-title">Alumnas activas</div>
      ${state.alumnas.length === 0 ? '<div class="empty">Todavía no cargaste alumnas.</div>' : ''}
      ${state.alumnas.map(a=>`
        <div class="alumna-row">
          <div class="av av-${a.color}">${initials(a.nombre)}</div>
          <div>
            <div class="alumna-name">${a.nombre}</div>
            <div class="alumna-sub"><span class="badge badge-${a.tipo==='gym'?'gym':'dist'}">${a.tipo==='gym'?'Gimnasio':'A distancia'}</span> · ${a.dias} días/semana</div>
          </div>
          <div class="row-actions">
            <button class="btn btn-sm" onclick="state.selAlumna=${a.id};state.selDia=1;state.selSemana=1;setView('rutinas')">Ver rutina</button>
          </div>
        </div>`).join('')}
    </div>`;
}

function renderAlumnas() {
  return `
    <div class="page-title">Alumnas</div>
    <div class="section-hd" style="margin-bottom:1rem;">
      <span></span>
      <button class="btn btn-primary btn-sm" onclick="state.addingAlumna=!state.addingAlumna;render()">+ Nueva alumna</button>
    </div>
    ${state.addingAlumna ? `
    <div class="card" style="margin-bottom:1rem;">
      <div class="card-title">Nueva alumna</div>
      <label>Nombre completo</label>
      <input type="text" placeholder="Ej: Laura Gómez" value="${state.newAlumna.nombre}"
        oninput="state.newAlumna.nombre=this.value;document.getElementById('slug-preview').textContent=slugify(this.value.split(' ')[0])">
      <label>Slug para el link (se genera solo)</label>
      <div style="font-size:12px;color:var(--verde-dark);margin-bottom:12px;font-family:monospace;">
        ${BASE_URL}/alumna/<span id="slug-preview">${slugify(state.newAlumna.nombre.split(' ')[0])||'nombre'}</span>
      </div>
      <div class="form-row">
        <div>
          <label>Tipo</label>
          <select onchange="state.newAlumna.tipo=this.value">
            <option value="gym">Gimnasio</option>
            <option value="distancia">A distancia</option>
          </select>
        </div>
        <div>
          <label>Días por semana</label>
          <select onchange="state.newAlumna.dias=parseInt(this.value)">
            <option value="2">2 días</option>
            <option value="3" selected>3 días</option>
          </select>
        </div>
      </div>
      <label>Notas personales</label>
      <textarea placeholder="Lesiones, objetivos, consideraciones..." oninput="state.newAlumna.notas=this.value">${state.newAlumna.notas}</textarea>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-primary btn-sm" onclick="addAlumna()">Guardar alumna</button>
        <button class="btn btn-sm" onclick="state.addingAlumna=false;render()">Cancelar</button>
      </div>
    </div>` : ''}
    ${state.alumnas.map(a=>`
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:0.75rem;">
        <div class="av av-${a.color}">${initials(a.nombre)}</div>
        <div style="flex:1;">
          <div class="alumna-name">${a.nombre}</div>
          <div class="alumna-sub"><span class="badge badge-${a.tipo==='gym'?'gym':'dist'}">${a.tipo==='gym'?'Gimnasio':'A distancia'}</span> · ${a.dias} días/semana</div>
        </div>
        <button class="btn btn-sm btn-danger" onclick="deleteAlumna(${a.id})">Eliminar</button>
      </div>
      ${a.notas ? `<div class="nota-box">${a.notas}</div>` : ''}
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary btn-sm" onclick="state.selAlumna=${a.id};state.selDia=1;state.selSemana=1;setView('rutinas')">Gestionar rutina</button>
        <button class="btn btn-sm" onclick="copyLink('${a.slug}')">Copiar link</button>
      </div>
    </div>`).join('')}
    ${state.saveMsg ? `<div class="save-msg">${state.saveMsg}</div>` : ''}`;
}

function renderRutinas() {
  const a = getAlumna(state.selAlumna);
  if (!a) return `<div class="page-title">Rutinas</div><div class="empty">Seleccioná una alumna primero desde Alumnas.</div>`;
  ensureRutina(a.id, state.selSemana);
  const ejercicios = getEjercicios(a.id, state.selSemana, state.selDia);
  return `
    <div class="page-title">Rutinas</div>
    <div style="display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;">
      ${state.alumnas.map(al=>`
        <button class="btn btn-sm${state.selAlumna===al.id?' btn-primary':''}" onclick="state.selAlumna=${al.id};state.selDia=1;state.selSemana=1;render()">
          ${al.nombre.split(' ')[0]}
        </button>`).join('')}
    </div>
    <div class="card" style="margin-bottom:1rem;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;">
        <div class="av av-${a.color}">${initials(a.nombre)}</div>
        <div>
          <div class="alumna-name">${a.nombre}</div>
          <div class="alumna-sub">${a.tipo==='gym'?'Gimnasio':'A distancia'} · ${a.dias} días/semana</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">Semana</div>
      <div class="semana-tab-row">
        ${[1,2,3,4].map(s=>`<button class="sem-tab${state.selSemana===s?' active':''}" onclick="state.selSemana=${s};render()">Semana ${s}</button>`).join('')}
      </div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;margin-top:0.25rem;">Día</div>
      <div class="day-tab-row">
        ${[1,2,3].slice(0,a.dias).map(d=>`<button class="day-tab${state.selDia===d?' active':''}" onclick="state.selDia=${d};render()">Día ${d}</button>`).join('')}
      </div>
      <div class="section-hd">
        <div class="section-hd-title">Ejercicios (${ejercicios.length})</div>
        <button class="btn btn-primary btn-sm" onclick="state.addingEx=!state.addingEx;render()">+ Agregar</button>
      </div>
      ${state.addingEx ? `
      <div class="card" style="margin-bottom:0.75rem;background:var(--surface);">
        <label>Nombre del ejercicio</label>
        <input type="text" placeholder="Ej: Sentadilla al cajón" value="${state.newEx.nombre}" oninput="state.newEx.nombre=this.value">
        <div class="form-row">
          <div><label>Series</label><input type="text" value="${state.newEx.series}" oninput="state.newEx.series=this.value" placeholder="3"></div>
          <div><label>Reps / tiempo</label><input type="text" value="${state.newEx.reps}" oninput="state.newEx.reps=this.value" placeholder="10"></div>
        </div>
        <label>Nota de técnica</label>
        <textarea placeholder="Indicaciones para la alumna..." oninput="state.newEx.tip=this.value">${state.newEx.tip}</textarea>
        <label>Link de video (YouTube)</label>
        <input type="text" value="${state.newEx.video}" oninput="state.newEx.video=this.value" placeholder="https://youtube.com/shorts/...">
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary btn-sm" onclick="addEjercicio()">Guardar ejercicio</button>
          <button class="btn btn-sm" onclick="state.addingEx=false;render()">Cancelar</button>
        </div>
      </div>` : ''}
      ${ejercicios.length===0 ? '<div class="empty">Sin ejercicios en este día.</div>' : ''}
      ${ejercicios.map((ex,i)=>`
      <div class="ex-item">
        <div class="ex-num-sm">${i+1}</div>
        <div style="flex:1;">
          <div class="ex-name">${ex.nombre}</div>
          <div class="ex-detail">${ex.series} series × ${ex.reps}</div>
          ${ex.tip ? `<div class="ex-tip">${ex.tip}</div>` : ''}
          ${ex.video ? `<div class="ex-vid">Video vinculado</div>` : ''}
        </div>
        <button class="btn btn-sm btn-danger" onclick="deleteEjercicio(${i})">×</button>
      </div>`).join('')}
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="btn btn-primary" onclick="save()">Guardar cambios</button>
      ${state.saveMsg ? `<span class="save-msg">${state.saveMsg}</span>` : ''}
      ${state.saveErr ? `<span class="err-msg">${state.saveErr}</span>` : ''}
    </div>`;
}

function renderLinks() {
  return `
    <div class="page-title">Links de alumnas</div>
    <div class="card" style="margin-bottom:1rem;background:var(--verde-light);border-color:var(--verde-mid);">
      <div style="font-size:13px;color:var(--verde-dark);line-height:1.6;">
        Cada alumna tiene su propio link. Copialo y mandáselo por WhatsApp — ella lo guarda en el celu y accede a su rutina con un toque.
      </div>
    </div>
    ${state.alumnas.length===0 ? '<div class="empty">Todavía no hay alumnas cargadas.</div>' : ''}
    ${state.alumnas.map(a=>`
    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:0.75rem;">
        <div class="av av-${a.color}">${initials(a.nombre)}</div>
        <div>
          <div class="alumna-name">${a.nombre}</div>
          <div class="alumna-sub"><span class="badge badge-${a.tipo==='gym'?'gym':'dist'}">${a.tipo==='gym'?'Gimnasio':'A distancia'}</span></div>
        </div>
      </div>
      <div class="link-box">
        <span>${BASE_URL}/alumna/${a.slug}</span>
        <button class="copy-btn" onclick="copyLink('${a.slug}')">Copiar</button>
      </div>
    </div>`).join('')}
    ${state.saveMsg ? `<div class="save-msg" style="margin-top:0.5rem;">${state.saveMsg}</div>` : ''}`;
}

load();
render();
</script>
</body>
</html>
