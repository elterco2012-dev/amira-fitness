<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Mi rutina — Amira Fitness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde: #1D9E75;
      --verde-light: #E1F5EE;
      --verde-mid: #5DCAA5;
      --verde-dark: #0F6E56;
      --purpura: #EEEDFE;
      --purpura-dark: #3C3489;
      --amber: #FAEEDA;
      --amber-dark: #633806;
      --rojo-light: #FCEBEB;
      --rojo-dark: #A32D2D;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --border: rgba(0,0,0,0.07);
      --border-md: rgba(0,0,0,0.12);
      --surface: #f8f8f6;
      --white: #ffffff;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-pill: 30px;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
    }
    .app { max-width: 430px; margin: 0 auto; padding-bottom: 3rem; }

    /* Header */
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--verde-light);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 15px; color: var(--verde-dark);
      flex-shrink: 0;
    }
    .header-txt h1 { font-size: 14px; font-weight: 500; }
    .header-txt p { font-size: 11px; color: var(--text-muted); }

    .screen { padding: 1rem 1.25rem; }

    /* Alumna card */
    .alumna-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem 1.1rem;
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 0.85rem;
      animation: fadeUp 0.3s ease;
    }
    .av {
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 16px; font-weight: 400;
      flex-shrink: 0;
    }
    .av-teal { background: var(--verde-light); color: var(--verde-dark); }
    .av-purple { background: var(--purpura); color: var(--purpura-dark); }
    .av-amber { background: var(--amber); color: var(--amber-dark); }
    .alumna-card h2 { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .alumna-card p { font-size: 11px; color: var(--text-muted); }

    /* Warmup */
    .warmup {
      background: var(--amber);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      margin-bottom: 0.85rem;
      animation: fadeUp 0.35s ease;
    }
    .warmup-title { font-size: 11px; font-weight: 500; color: var(--amber-dark); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
    .warmup a {
      font-size: 12px; color: var(--amber-dark);
      display: flex; align-items: center; gap: 6px;
      text-decoration: none; margin-top: 4px;
      font-weight: 500;
    }
    .play { width: 18px; height: 18px; border-radius: 50%; background: var(--amber-dark); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .play::after { content:''; border-left: 5px solid var(--amber); border-top: 3px solid transparent; border-bottom: 3px solid transparent; margin-left: 2px; }

    /* Day tabs */
    .day-tabs { display: flex; gap: 6px; margin-bottom: 0.85rem; }
    .dtab {
      flex: 1; padding: 9px 4px;
      border-radius: var(--radius-pill);
      font-size: 12px; font-weight: 500;
      border: 1px solid var(--border-md);
      background: var(--white);
      color: var(--text-muted);
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .dtab.active { background: var(--verde); color: white; border-color: var(--verde); }

    /* Semana tabs */
    .semana-row { display: flex; gap: 5px; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .stab {
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      font-size: 11px;
      border: 1px solid var(--border-md);
      background: var(--white);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .stab.active { background: var(--purpura); color: var(--purpura-dark); border-color: transparent; font-weight: 500; }

    /* Progress */
    .prog-wrap { margin-bottom: 1rem; }
    .prog-top { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; }
    .prog-bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--verde); border-radius: 99px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

    .day-label { font-size: 10px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.6rem; }

    /* Exercise cards */
    .ex-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.8rem 1rem;
      margin-bottom: 0.5rem;
      transition: all 0.25s;
      animation: fadeUp 0.3s ease;
    }
    .ex-card.done {
      background: var(--verde-light);
      border-color: var(--verde-mid);
    }
    .ex-top { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .ex-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 500; color: var(--text-muted);
      flex-shrink: 0;
      transition: all 0.25s;
    }
    .ex-card.done .ex-num { background: var(--verde); color: white; border-color: var(--verde); }
    .ex-name { font-size: 13px; font-weight: 500; flex: 1; }
    .ex-detail { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

    .ex-btns {
      display: flex; gap: 7px; align-items: center;
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .btn-tip {
      background: var(--purpura); border: none;
      border-radius: var(--radius-sm);
      padding: 5px 11px; font-size: 11px;
      color: var(--purpura-dark); cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    .btn-tip:hover { opacity: 0.8; }
    .btn-vid {
      background: var(--rojo-light); border: none;
      border-radius: var(--radius-sm);
      padding: 5px 11px; font-size: 11px;
      color: var(--rojo-dark); cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .btn-check {
      margin-left: auto;
      background: var(--surface); border: 1px solid var(--border-md);
      border-radius: var(--radius-sm);
      padding: 5px 11px; font-size: 11px;
      color: var(--text-muted); cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      transition: all 0.2s;
    }
    .ex-card.done .btn-check {
      background: var(--verde-light);
      color: var(--verde-dark);
      border-color: var(--verde-mid);
    }
    .tip-txt {
      font-size: 12px; color: var(--verde-dark);
      background: var(--verde-light);
      border-radius: var(--radius-sm);
      padding: 8px 10px; margin-top: 8px;
      line-height: 1.55;
      display: none;
    }
    .tip-txt.show { display: block; animation: fadeUp 0.2s ease; }

    /* Done banner */
    .done-banner {
      text-align: center;
      padding: 1.25rem 0 0.5rem;
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--verde-dark);
      animation: fadeUp 0.4s ease;
    }

    /* Nota */
    .nota {
      background: var(--amber);
      border-radius: var(--radius-sm);
      padding: 0.7rem 1rem;
      font-size: 12px; color: var(--amber-dark);
      line-height: 1.55;
      margin-top: 1rem;
    }

    /* Not found */
    .not-found {
      text-align: center; padding: 3rem 1rem;
    }
    .not-found h2 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; margin-bottom: 0.5rem; }
    .not-found p { font-size: 13px; color: var(--text-muted); }

    /* Loading */
    .loading { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 13px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="logo">A</div>
      <div class="header-txt">
        <h1>Amira Fitness</h1>
        <p>Tu entrenamiento personalizado</p>
      </div>
    </div>
    <div class="screen" id="screen">
      <div class="loading">Cargando tu rutina...</div>
    </div>
  </div>

<script>
  const slug = location.pathname.split('/').filter(Boolean).pop() || '';

  let alumnas = [];
  let rutinas = {};
  let selectedSemana = 1;
  let selectedDia = 1;
  let done = {};
  let expanded = {};

  function initials(n) {
    return n.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  function doneKey(aId, s, d, i) { return `${aId}-${s}-${d}-${i}`; }
  function expKey(aId, s, d, i) { return `exp-${aId}-${s}-${d}-${i}`; }

  function getAlumna() {
    return alumnas.find(a => a.slug === slug || a.nombre.toLowerCase().split(' ')[0] === slug);
  }

  function getEjercicios(alumnaId) {
    try {
      return rutinas[alumnaId]?.[selectedSemana]?.find(d => d.dia === selectedDia)?.ejercicios || [];
    } catch(e) { return []; }
  }

  function toggleDone(aId, i) {
    const k = doneKey(aId, selectedSemana, selectedDia, i);
    done[k] = !done[k];
    saveDone();
    render();
  }

  function toggleExp(aId, i) {
    const k = expKey(aId, selectedSemana, selectedDia, i);
    expanded[k] = !expanded[k];
    render();
  }

  function saveDone() {
    try { localStorage.setItem('amira-done', JSON.stringify(done)); } catch(e) {}
  }

  function loadDone() {
    try {
      const d = localStorage.getItem('amira-done');
      if (d) done = JSON.parse(d);
    } catch(e) {}
  }

  function render() {
    const screen = document.getElementById('screen');
    const a = getAlumna();

    if (!a) {
      screen.innerHTML = `
        <div class="not-found">
          <div style="font-size:2rem;margin-bottom:0.75rem;">🤔</div>
          <h2>Rutina no encontrada</h2>
          <p>Este link no corresponde a ninguna alumna.<br>Pedile a Amira que te reenvíe tu link.</p>
        </div>`;
      return;
    }

    document.title = `Rutina de ${a.nombre.split(' ')[0]} — Amira Fitness`;

    const ejercicios = getEjercicios(a.id);
    const completados = ejercicios.filter((_, i) => done[doneKey(a.id, selectedSemana, selectedDia, i)]).length;
    const total = ejercicios.length;
    const pct = total > 0 ? Math.round((completados / total) * 100) : 0;

    const semanas = Object.keys(rutinas[a.id] || { 1: [] }).map(Number);

    let html = `
      <div class="alumna-card">
        <div class="av av-${a.color || 'teal'}">${initials(a.nombre)}</div>
        <div>
          <h2>Hola, ${a.nombre.split(' ')[0]} 👋</h2>
          <p>${a.tipo === 'gym' ? 'Gimnasio' : 'A distancia'} · ${a.dias} días por semana</p>
        </div>
      </div>

      <div class="warmup">
        <div class="warmup-title">Entrada en calor — hacé esto primero</div>
        <a href="https://youtu.be/x4NkmMOVZkc" target="_blank"><span class="play"></span>Movimiento articular</a>
        <a href="https://youtu.be/QjjuSQm61SA" target="_blank"><span class="play"></span>Entrada en calor sin impacto</a>
      </div>

      ${semanas.length > 1 ? `<div class="semana-row">${semanas.map(s => `<button class="stab${selectedSemana === s ? ' active' : ''}" onclick="selectedSemana=${s};selectedDia=1;render()">Semana ${s}</button>`).join('')}</div>` : ''}

      <div class="day-tabs">
        ${[1,2,3].slice(0, a.dias).map(d => `<button class="dtab${selectedDia === d ? ' active' : ''}" onclick="selectedDia=${d};render()">Día ${d}</button>`).join('')}
      </div>

      <div class="prog-wrap">
        <div class="prog-top"><span>${completados} de ${total} ejercicios</span><span>${pct}%</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>

      <div class="day-label">Día ${selectedDia} · Semana ${selectedSemana}</div>
    `;

    if (ejercicios.length === 0) {
      html += `<div style="font-size:13px;color:var(--text-muted);padding:1rem 0;text-align:center;">No hay ejercicios cargados para este día todavía.</div>`;
    }

    ejercicios.forEach((ex, i) => {
      const isDone = !!done[doneKey(a.id, selectedSemana, selectedDia, i)];
      const isExp = !!expanded[expKey(a.id, selectedSemana, selectedDia, i)];
      html += `
        <div class="ex-card${isDone ? ' done' : ''}">
          <div class="ex-top" onclick="toggleDone(${a.id}, ${i})">
            <div class="ex-num">${isDone ? '✓' : i + 1}</div>
            <div style="flex:1;">
              <div class="ex-name">${ex.nombre}</div>
              <div class="ex-detail">${ex.series} series × ${ex.reps}</div>
            </div>
          </div>
          <div class="ex-btns">
            ${ex.tip ? `<button class="btn-tip" onclick="toggleExp(${a.id}, ${i})">${isExp ? 'Ocultar' : 'Ver técnica'}</button>` : ''}
            ${ex.video ? `<a class="btn-vid" href="${ex.video}" target="_blank">▶ Video</a>` : ''}
            <button class="btn-check" onclick="toggleDone(${a.id}, ${i})">${isDone ? '✓ Hecho' : 'Marcar hecho'}</button>
          </div>
          ${ex.tip ? `<div class="tip-txt${isExp ? ' show' : ''}">${ex.tip}</div>` : ''}
        </div>`;
    });

    if (total > 0 && completados === total) {
      html += `<div class="done-banner">¡Excelente, ${a.nombre.split(' ')[0]}! Terminaste el día 🎉</div>`;
    }

    if (a.notas) {
      html += `<div class="nota">💬 ${a.notas}</div>`;
    }

    screen.innerHTML = html;
  }

  async function init() {
    loadDone();
    try {
      const res = await fetch('/api/data.json');
      if (res.ok) {
        const data = await res.json();
        alumnas = data.alumnas || [];
        rutinas = data.rutinas || {};
      }
    } catch(e) {}

    if (alumnas.length === 0) {
      alumnas = JSON.parse(localStorage.getItem('amira-alumnas') || '[]');
      rutinas = JSON.parse(localStorage.getItem('amira-rutinas') || '{}');
    }

    render();
  }

  init();
</script>
</body>
</html>
