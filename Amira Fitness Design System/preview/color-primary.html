<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Colors — Primary verde" subtitle="#1D9E75 + 3 supporting tones" viewport="700x220" -->
<html lang="es"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'DM Sans',sans-serif;}
  body{background:#fff;padding:28px 32px;color:#1a1a1a;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .sw{display:flex;flex-direction:column;gap:8px;}
  .chip{aspect-ratio:1.6/1;border-radius:14px;border:1px solid rgba(0,0,0,0.07);position:relative;}
  .lbl{font-size:12px;font-weight:500;color:#1a1a1a;}
  .hex{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:11px;color:#9ca3af;}
  .role{font-size:10px;color:#6b7280;line-height:1.4;}
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#1D9E75;"></div><div class="lbl">Verde · primary</div><div class="hex">#1D9E75</div><div class="role">CTAs, logo, brand mark, success state</div></div>
    <div class="sw"><div class="chip" style="background:#E1F5EE;"></div><div class="lbl">Verde light</div><div class="hex">#E1F5EE</div><div class="role">Badges, avatar fills, tip backgrounds</div></div>
    <div class="sw"><div class="chip" style="background:#5DCAA5;"></div><div class="lbl">Verde mid</div><div class="hex">#5DCAA5</div><div class="role">Hover-state accents on dark sections</div></div>
    <div class="sw"><div class="chip" style="background:#0F6E56;"></div><div class="lbl">Verde dark</div><div class="hex">#0F6E56</div><div class="role">Pressed CTAs, text-on-light-green</div></div>
  </div>
</body></html>
