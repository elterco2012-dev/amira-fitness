<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing — Scale" subtitle="4 → 80px (section padding)" viewport="700x180" -->
<html lang="es"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'DM Sans',sans-serif;}
  body{background:#fff;padding:28px 32px;color:#1a1a1a;}
  .row{display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap;}
  .item{display:flex;flex-direction:column;gap:6px;}
  .bar{background:#1D9E75;height:24px;border-radius:3px;}
  .lbl{font-size:11px;font-weight:500;}
  .val{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#9ca3af;}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px;"></div><div class="lbl">1</div><div class="val">4px</div></div>
    <div class="item"><div class="bar" style="width:8px;"></div><div class="lbl">2</div><div class="val">8px</div></div>
    <div class="item"><div class="bar" style="width:12px;"></div><div class="lbl">3</div><div class="val">12px</div></div>
    <div class="item"><div class="bar" style="width:16px;"></div><div class="lbl">4</div><div class="val">16px</div></div>
    <div class="item"><div class="bar" style="width:20px;"></div><div class="lbl">5</div><div class="val">20px</div></div>
    <div class="item"><div class="bar" style="width:24px;"></div><div class="lbl">6</div><div class="val">24px</div></div>
    <div class="item"><div class="bar" style="width:32px;"></div><div class="lbl">8</div><div class="val">32px</div></div>
    <div class="item"><div class="bar" style="width:40px;"></div><div class="lbl">10</div><div class="val">40px</div></div>
    <div class="item"><div class="bar" style="width:48px;"></div><div class="lbl">12</div><div class="val">48px</div></div>
    <div class="item"><div class="bar" style="width:80px;"></div><div class="lbl">16</div><div class="val">80px · section</div></div>
  </div>
  <div style="margin-top:24px;font-size:11px;color:#6b7280;line-height:1.6;max-width:600px;">
    Section vertical padding is <strong style="color:#1a1a1a;">5rem (80px)</strong> on desktop, <strong style="color:#1a1a1a;">3.5rem (56px)</strong> on mobile. Card padding sits around 1–1.75rem (16–28px).
  </div>
</body></html>
