<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Colors — Accents" subtitle="Purple, amber, coral, rojo (bg + text pairs)" viewport="700x200" -->
<html lang="es"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'DM Sans',sans-serif;}
  body{background:#fff;padding:28px 32px;color:#1a1a1a;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .pair{border-radius:14px;overflow:hidden;border:1px solid rgba(0,0,0,0.07);display:flex;}
  .pair > div{flex:1;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;padding:18px 8px;}
  .meta{display:flex;flex-direction:column;gap:3px;margin-top:8px;}
  .lbl{font-size:12px;font-weight:500;}
  .hex{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#9ca3af;}
  .role{font-size:10px;color:#6b7280;line-height:1.4;}
</style></head>
<body>
  <div class="grid">
    <div>
      <div class="pair">
        <div style="background:#EEEDFE;color:#3C3289;">Aa</div>
        <div style="background:#3C3289;color:#EEEDFE;">Aa</div>
      </div>
      <div class="meta"><div class="lbl">Purple</div><div class="hex">#EEEDFE · #3C3289</div><div class="role">Tips, info notes, alumna avatars</div></div>
    </div>
    <div>
      <div class="pair">
        <div style="background:#FAEEDA;color:#633806;">Aa</div>
        <div style="background:#633806;color:#FAEEDA;">Aa</div>
      </div>
      <div class="meta"><div class="lbl">Amber</div><div class="hex">#FAEEDA · #633806</div><div class="role">Warmup card, exercise notes, warn buttons</div></div>
    </div>
    <div>
      <div class="pair">
        <div style="background:#FAECE7;color:#712B13;">Aa</div>
        <div style="background:#712B13;color:#FAECE7;">Aa</div>
      </div>
      <div class="meta"><div class="lbl">Coral</div><div class="hex">#FAECE7 · #712B13</div><div class="role">Coral avatar — alumna decorative</div></div>
    </div>
    <div>
      <div class="pair">
        <div style="background:#FCEBEB;color:#A32D2D;">Aa</div>
        <div style="background:#A32D2D;color:#FCEBEB;">Aa</div>
      </div>
      <div class="meta"><div class="lbl">Rojo · danger</div><div class="hex">#FCEBEB · #A32D2D</div><div class="role">Destructive actions, error messages, video chip</div></div>
    </div>
  </div>
</body></html>
