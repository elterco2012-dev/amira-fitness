<!DOCTYPE html>
<!-- @dsCard group="Components" name="Components — Nav patterns" subtitle="Top sticky · App header · Bottom fixed" viewport="700x440" -->
<html lang="es"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'DM Sans',sans-serif;}
  body{background:#f8f8f6;padding:28px 32px;color:#1a1a1a;}
  .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;margin-bottom:10px;font-weight:500;}
  .group{margin-bottom:24px;}

  /* Top nav (marketing) */
  nav{background:rgba(255,255,255,0.93);backdrop-filter:blur(14px);border:1px solid rgba(0,0,0,0.07);border-radius:14px;padding:.9rem 1.2rem;display:flex;align-items:center;justify-content:space-between;}
  .nav-brand{display:flex;align-items:center;gap:10px;font-weight:500;font-size:15px;color:#1a1a1a;}
  .nav-logo{width:34px;height:34px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:14px;color:#0F6E56;}
  .nav-links{display:flex;align-items:center;gap:1.2rem;}
  .nav-links a{font-size:13px;color:#6b7280;text-decoration:none;}
  .nav-cta{background:#1D9E75;color:white!important;padding:7px 16px;border-radius:30px;font-size:13px;font-weight:500;text-decoration:none;}

  /* Bottom nav (alumna) */
  .bnav{background:#fff;border:1px solid rgba(0,0,0,0.07);border-radius:14px;display:flex;max-width:430px;overflow:hidden;}
  .bitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;background:none;border:none;}
  .bitem span:first-child{font-size:18px;}
  .bitem span:last-child{font-size:10px;color:#6b7280;}
  .bitem.active span:last-child{color:#1D9E75;font-weight:500;}

  /* App header */
  .header{background:#fff;border:1px solid rgba(0,0,0,0.07);border-radius:14px;padding:.9rem 1.25rem;display:flex;align-items:center;gap:10px;max-width:430px;}
  .hlogo{width:34px;height:34px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:14px;color:#0F6E56;}
  .htxt{flex:1;}
  .htxt h1{font-size:14px;font-weight:500;}
  .htxt p{font-size:11px;color:#6b7280;}
  .hbtn{background:none;border:1px solid rgba(0,0,0,0.12);border-radius:20px;padding:4px 10px;font-size:11px;color:#6b7280;}
</style></head>
<body>
  <div class="group">
    <div class="lbl">Sticky top nav · marketing</div>
    <nav>
      <a class="nav-brand">
        <div class="nav-logo">A</div>
        Amira Fitness
      </a>
      <div class="nav-links">
        <a>Cómo funciona</a>
        <a>El servicio</a>
        <a>La app</a>
        <a class="nav-cta">Quiero empezar</a>
      </div>
    </nav>
  </div>
  <div class="group">
    <div class="lbl">App header · alumna</div>
    <div class="header">
      <div class="hlogo">A</div>
      <div class="htxt">
        <h1>María · Día 2</h1>
        <p>Semana 2 · Ciclo 3</p>
      </div>
      <button class="hbtn">🌙</button>
    </div>
  </div>
  <div class="group">
    <div class="lbl">Bottom nav · alumna (fixed)</div>
    <nav class="bnav">
      <button class="bitem active"><span>🏋️</span><span>Rutina</span></button>
      <button class="bitem"><span>📈</span><span>Progreso</span></button>
      <button class="bitem"><span>💬</span><span>Notas</span></button>
      <button class="bitem"><span>👤</span><span>Perfil</span></button>
    </nav>
  </div>
</body></html>
