<!DOCTYPE html>
<html lang="es">
<head>

  <title>Amira Fitness — Entrenadora personal</title>
  <!-- No indexar esta página, es solo para Instagram bio -->
  <meta name="robots" content="noindex">
  <meta property="og:title" content="Amira Fitness — Entrenadora personal">
  <meta property="og:description" content="Rutinas personalizadas · Casa o gym · Te respondo yo por WhatsApp">
  <meta property="og:image" content="https://amira-fitness.vercel.app/foto-amira.jpg">

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --v:#1D9E75;--vl:#E1F5EE;--vd:#0F6E56;--vm:#5DCAA5;
      --t:#1a1a1a;--tm:#6b7280;--th:#9ca3af;
      --s:#f8f8f6;--b:rgba(0,0,0,0.08);
    }
    html,body{height:100%;background:var(--s);font-family:'DM Sans',sans-serif;color:var(--t);}
    body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:2rem 1.25rem;}

    .card{width:100%;max-width:420px;}

    /* Header */
    .profile{display:flex;flex-direction:column;align-items:center;margin-bottom:2rem;}
    .avatar{width:148px;height:148px;border-radius:50%;object-fit:cover;object-position:center 42%;border:3px solid white;box-shadow:0 4px 16px rgba(0,0,0,.12);margin-bottom:.9rem;background:var(--vl);}
    .avatar-fallback{width:148px;height:148px;border-radius:50%;background:var(--vl);display:flex;align-items:center;justify-content:center;font-size:2.5rem;margin-bottom:.9rem;border:3px solid white;box-shadow:0 4px 16px rgba(0,0,0,.12);}
    .profile-name{font-size:1.25rem;font-weight:600;color:var(--t);letter-spacing:-.01em;}
    .profile-sub{font-size:.875rem;color:var(--vm);font-weight:500;margin-top:.25rem;}
    .profile-loc{font-size:.8rem;color:var(--th);margin-top:.2rem;}

    /* Links */
    .links{display:flex;flex-direction:column;gap:.75rem;}
    .link-btn{
      display:flex;align-items:center;gap:14px;
      background:white;border:1.5px solid var(--b);border-radius:14px;
      padding:15px 18px;text-decoration:none;color:var(--t);
      transition:transform .15s,box-shadow .15s,border-color .15s;
      cursor:pointer;
    }
    .link-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08);border-color:rgba(0,0,0,.14);}
    .link-btn:active{transform:translateY(0);box-shadow:none;}
    .link-btn.primary{background:var(--v);border-color:var(--v);color:white;}
    .link-btn.primary:hover{background:var(--vd);border-color:var(--vd);}
    .link-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--vl);}
    .link-btn.primary .link-icon{background:rgba(255,255,255,.2);}
    .link-text{flex:1;}
    .link-title{font-size:.9375rem;font-weight:500;line-height:1.2;}
    .link-sub{font-size:.75rem;color:var(--tm);margin-top:.15rem;line-height:1.3;}
    .link-btn.primary .link-sub{color:rgba(255,255,255,.7);}
    .link-arrow{font-size:16px;color:var(--th);flex-shrink:0;}
    .link-btn.primary .link-arrow{color:rgba(255,255,255,.6);}

    /* Footer */
    .footer{margin-top:1.75rem;font-size:.75rem;color:var(--th);text-align:center;}
    .footer a{color:var(--vm);text-decoration:none;}
  </style>
</head>
